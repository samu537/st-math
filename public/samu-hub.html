50%);\n            text-align: center;\n            font-family: monospace;\n            font-size: 20px;\n        }\n        \n        #progress {\n            margin-top: 20px;\n            font-size: 16px;\n        }\n    </style>\n</head>\n\n<body>\n    <div id=\"loading\">\n        <div>Loading...</div>\n        <div id=\"progress\">Loading part 13/23...</div>\n    </div>\n    <canvas id=\"canvas\" style=\"width: 50%; height: 50%; display: none; margin: 0 auto;\" onclick=\"window.focus();\">\n    <script type=\"text/javascript\" src=\"js/es6-promise.js\"><\/script>\n    <script type=\"text/javascript\" src=\"js/browserfs.min.js\"><\/script>\n    <script type=\"text/javascript\" src=\"js/loader.js\"><\/script>\n    <script src=\"https://code.jquery.com/jquery-2.1.1.min.js\"><\/script>\n\n    <script type=\"text/javascript\">\n        const PARTS_FOLDER = 'softs/fallout/';  \n        const BASE_FILENAME = 'fallout.zip';   \n        const NUM_PARTS = 23;                   \n\n        async function loadAndMergeZipParts() {\n            const progressEl = document.getElementById('progress');\n            const loadingEl = document.getElementById('loading');\n            \n            try {\n                const chunks = [];\n                \n                for (let i = 1; i <= NUM_PARTS; i++) {\n                    progressEl.textContent = `Loading part ${i}/${NUM_PARTS}...`;\n                    \n                    const partNum = i.toString().padStart(2, '0');\n                    const partUrl = `${PARTS_FOLDER}${BASE_FILENAME}.part${partNum}`;\n                    const response = await fetch(partUrl);\n                    \n                    if (!response.ok) {\n                        throw new Error(`Failed to load ${partUrl}: ${response.status}`);\n                    }\n                    \n                    const arrayBuffer = await response.arrayBuffer();\n                    chunks.push(arrayBuffer);\n                    \n                    const progress = Math.round((i / NUM_PARTS) * 100);\n                    progressEl.textContent = `Merging archive parts: ${progress}%`;\n                }\n                \n                progressEl.textContent = 'Merging complete! Starting emulator...';\n                const mergedBlob = new Blob(chunks, { type: 'application/zip' });\n                \n                const blobUrl = URL.createObjectURL(mergedBlob);\n                \n                loadingEl.style.display = 'none';\n                document.getElementById('canvas').style.display = 'block';\n                \n                startEmulator(blobUrl);\n                \n            } catch (error) {\n                progressEl.textContent = `Error: ${error.message}`;\n                console.error('Failed to load game:', error);\n            }\n        }\n\n        function startEmulator(zipUrl) {\n            var dosbox = new Emulator(document.querySelector(\"#canvas\"),\n                null,\n                new DosBoxLoader(DosBoxLoader.emulatorJS(\"js/dosbox-sync.js\"),\n                    DosBoxLoader.locateAdditionalEmulatorJS(locateAdditionalFiles),\n                    DosBoxLoader.nativeResolution(640, 400),\n                    DosBoxLoader.mountZip(\"c\",\n                        DosBoxLoader.fetchFile(\"Software\", zipUrl)),\n                    DosBoxLoader.startExe('FALLOUT/FALLOUT.EXE')));\n            dosbox.start({\n                waitAfterDownloading: false\n            });\n\n            function locateAdditionalFiles(filename) {\n                if (filename === \"dosbox.html.mem\") {\n                    return \"js/dosbox-sync.mem\";\n                }\n                return \"js/\" + filename;\n            }\n        }\n\n        window.addEventListener('load', loadAndMergeZipParts);\n    <\/script>\n\n\n</canvas></body></html>"},{"id":"ede858e8-f38b-4779-9a22-9ec76364f7a3","title":"geometry dash world","description":"Geometry Dash World is a free, rhythm-based arcade p status-bar-style\" content=\"black-translucent\" />\n    <meta charset=\"utf-8\" />\n\n    <\!-- Set the title bar of the page -->\n    <title>Bacon May Die by SnoutUp </title>\n    <meta name=\"robots\" content=\"noindex,nofollow\" />\n    <script src=\"poki-sdk.js\"><\/script>\n    <script><\/script>\n\n    <script>\n        var adsAreDisabled = true;\n    <\/script>\n    <script src=\"html5game/prebid/ads.js\"><\/script>\n    <style>\n        html {\n            height: 100%;\n            width: 100%;\n        }\n\n        body {\n            background: #f3c2b5;\n            color: #cccccc;\n            margin: 0px;\n            padding: 0px;\n            border: 0px;\n            overflow: hidden;\n\n            height: 100%;\n\n            background-color: #191923;\n\n            //background-image: url('html5game/wolf.gif');\n            background-image: url('html5game/bg.jpg');\n            background-repeat: repeat-x;\n            background-position: center center;\n            background-size: 0 0;\n        }\n\n        #bar {\n            position: fixed;\n            height: 56%;\n            width: 5px;\n\n            top: 0;\n            left: 0;\n            right: 0;\n\n            margin: 0 auto;\n            padding: 3px;\n            background: #191923;\n            background-color: rgba(25, 25, 35, 0.5);\n            z-index: -9999;\n        }\n\n        img#spider {\n            position: absolute;\n            left: -67px;\n            bottom: -30px;\n\n        }\n\n        #fill {\n            position: relative;\n            height: 1%;\n            background: #a4a6b5;\n            width: 5px;\n            margin: 0px;\n        }\n\n\n        img.torch {\n            position: fixed;\n            height: 128px;\n            width: 128px;\n            top: 30%;\n            background: url('html5game/tbg.png') 50% 50% no-repeat;\n            background-size: 128px;\n        }\n\n\n\n\n        #t1 {\n            left: 20%;\n        }\n\n        #t2 {\n            right: 20%;\n        }\n\n        img#door {\n            position: fixed;\n            top: 35%;\n            left: 0;\n            right: 0;\n            margin: 0 auto;\n            z-index: 10;\n            display: none;\n        }\n\n\n        canvas {\n            image-rendering: optimizeSpeed;\n            -webkit-interpolation-mode: nearest-neighbor;\n            -ms-touch-action: none;\n            margin: 0px;\n            padding: 0px;\n            border: 0px;\n            display: none;\n        }\n\n        #canvas,\n        canvas {\n            -webkit-tap-highlight-color: transparent;\n            -webkit-touch-callout: none;\n            -webkit-user-select: none;\n            -khtml-user-select: none;\n            -moz-user-select: none;\n            -ms-user-select: none;\n            user-select: none;\n        }\n\n        :-webkit-full-screen #canvas {\n            width: 100%;\n            height: 100%;\n        }\n\n        div.gm4html5_div_class {\n            margin: 0px;\n            padding: 0px;\n            border: 0px;\n        }\n\n\n        .\n    </style>\n</head>\n\n<body id=\"body\">\n    <div class=\"gm4html5_div_class\" id=\"gm4html5_div_id\">\n        <\!-- Create the canvas element the game draws to -->\n        <canvas id=\"canvas\" width=\"1024\" height=\"576\">\n            <p>Your browser doesn't support HTML5 canvas.</p>\n        </canvas>\n        <script type=\"text/javascript\" src=\"html5game/BaconMayDie.js\"><\/script>\n    </div>\n    <div id=\"bar\">\n        <div id=\"fill\"><img id=\"spider\" alt=\"\" src=\"html5game/spider.png\"/></div>\n    </div>\n\n    <div id=\"decor\">\n\n        <img class=\"torch\" id=\"t1\" src=\"html5game/torch.gif\" alt=\"\"/>\n        <img class=\"torch\" id=\"t2\" src=\"html5game/torch.gif\" alt=\"\"/>\n        <img id=\"door\" alt=\"\" src=\"html5game/door.png\"/>\n    </div>\n\n    <script>\n        var sdk \t\t= PokiSDK;\n\t\tvar pokiDebug \t= false;\n        var canvas      = document.getElementById(\"canvas\");\n\t\tvar body \t\t= document.getElementById(\"body\");\n\t\tvar bar \t\t= document.getElementById(\"bar\");\n\t\tvar fill \t\t= document.getElementById(\"fill\");\n\n\t\tvar decor \t\t= document.getElementById(\"decor\");\t\t\n\n\t\tvar fakeCent\t\t= 1;\t\n\t\tvar fakeCentTarget \t= 75;\n\t\tvar fails\t\t\t= 0;\n\t\t\n\t\tfunction poki_log(t) {\n\t\t\tconsole.log(t);\n\t\t}\n            \n        function poki_debug() {\n            return pokiDebug;\n        }\n\t\t\n\t\tfunction poki_loading(progress) {\n\t\t\tfakeCentTarget = Math.max(fakeCentTarget, progress * 100);\n\t\t\tsdk.gameLoadingProgress({percentageDone: progress * 0.9});\n\t\t\t\n\t\t\tif (progress == 1) {\n\t\t\t\tsetTimeout(function () {\n                    clearInterval(fakeLoading);\n\t\t\t\t\tbar.style.display \t\t= \"none\";\t\t\n\t\t\t\t\tdecor.style.display\t\t= \"none\";\n\t\t\t\t\tcanvas.style.display \t= \"block\";\n\t\t\t\t}, 1000);\n\t\t\t}\n\t\t}\n\t\t\n\t\tfunction bar_update(progress) {\n\t\t\tprogress = Math.max(fakeCent, progress);\n\t\t\tfill.style.height = progress + \"%\";\n\t\t}\n\t\t\n\t\tvar fakeLoading = setInterval(function() {\n\t\t\t\tfakeCent = loading_lerp(fakeCent, fakeCentTarget, 0.05);\n\t\t\t\tbar_update(fakeCent);\t\t\t\t\t\t\t\n\t\t}, 20);\t\t\n\t\t\n\t\t\n\t\tfunction gamemaker_start() {\n\t\t\ttry {\n\t\t\t  GameMaker_Init();\n\t\t\t} catch(err) {\n\t\t\t\tfails++;\t\t\t\n\t\t\t\tsetTimeout(gamemaker_start, 5000);\n\t\t\t\tif (fails == 1) throw(err);\t\t\t\t\t\t\n\t\t\t}\n\t\t}\n\n\t\tvar bgScale = window.innerHeight / 1024;\n\t\tbody.style.backgroundSize = (512 * bgScale) + \"px \" + (1024 * bgScale) + \"px\";\n\t\t\n\t\twindow.onload = function() {\n\t\t\tsdk.init().then(() => {\n                setTimeout(gamemaker_start, adsAreDisabled ? 5000 : 1);\n                sdk.setDebug(pokiDebug);   \n\t\t\t\tsdk.gameLoadingStart();\t\t\n\t\t\t}).catch(() => {\n                gamemaker_start();\n\t\t\t});\n        \n            canvas.width  = window.innerWidth;\n            canvas.height = window.innerHeight;\n            canvas.addEventListener('click', function(){\n                window.focus();\n            });           \n\n\n\t\t\t//document.getElementById(\"door\").style.top= (300 * bgScale) + \"px\";\n\t\t\t//document.getElementById(\"door\").style.width = (bgScale * 100) +\"%\";\n\t\t\t//document.getElementById(\"door\").style.height = (bgScale * 100) +\"%\";\n\t\t}\n\t\t\n\t\twindow.addEventListener('wheel', ev => ev.preventDefault(), { passive: false });\n\t\twindow.addEventListener('keydown', ev => {\n\t\t\tif (['ArrowDown', 'ArrowUp', ' '].includes(ev.key)) {\n\t\t\t\tev.preventDefault();\n\t\t\t}\n\t\t});\t\t\n            \n                \n        /// smooth things out \n        function loading_lerp (start, end, amt){\n            return (1 - amt) * start + amt * end;\n        }\n    <\/script>\n  \n\n</body>\n\n</html>"},{"id":"6bee1511-46c0-4c71-b671-bd2e308d8663","title":"Tomb under the mask","description":"AI Overview               The \"Tomb of the Mask\" is a hit, fast-paced retro arcade game developed by Happymagenta UAB and published by Playgendary. The gameplay centers on navigating a procedurally generated vertical maze, collecting coins and dots, and racing against an encroaching tide of lava from the bottom of the screen.","image":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRBsbDmtIMBHuAbTEpqzMTQ9RZ2R0tsZHrT0A&s","type":"html","content":"<!DOCTYPE html>\n\n\n\n<\!-- Ultimate Game Stash file--> \n<\!-- For the regularly updating doc go to https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/ -->\n\n\n\n\n<base href=\"https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/tomb/\">\n<html lang=\"en\">\n<head>\n  <meta charset=\"utf-8\">\n  <title>New Tab</title>\n  <link href=\"style.css\" rel=\"stylesheet\">\n  <style>\n    html, body {\n      margin: 0;\n      padding: 0;\n      height: 100%;\n      width: 100%;\n      overflow: hidden; /* prevent scrollbars */\n      background: black; /* optional: black background */\n    }\n    #gameContainer {\n      width: 100vw;\n      height: 100vh;\n    }\n  </style>\n</head>\n<body dir=\"ltr\">\n  <script src=\"UnityProgress.js\"><\/script>\n  <script src=\"UnityLoader.js\"><\/script>\n  <script>\n    var gameInstance = UnityLoader.instantiate(\"gameContainer\", \"totm.json\", {\n      onProgress: UnityProgress,\n      Module: {\n        onRuntimeInitialized: function() {\n          UnityProgress(gameInstance, \"complete\");\n        }\n      }\n    });\n  <\/script>\n\n  <div class=\"webgl-content\">\n    <div id=\"gameContainer\"></div>\n  </div>\n</body>\n</html>"},{"id":"cfaabd3e-e978-4c79-b9ce-c4f8af085a67","title":"Fears of Fathom:Home Alone","description":"Fears to Fathom is an episodic psychological horror game series developed by indie developer Rayll. The games feature short, narrative-driven stories based on supposedly true, crowd-sourced survival stories. Players make choices in realistic scenarios—ranging from being left home alone to working a remote fire lookout—with gameplay featuring decision-making, text messaging NPCs, and psychological suspense.","image":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSXj2pCpq9S0EfHH_WC9-NJxtYsp2IqUujclg&s","type":"html","content":"<!DOCTYPE html>\n<html lang=\"en-us\">\n\n<head>\n    <base href=\"https://cdn.jsdelivr.net/gh/marty-games/mga-unity@main/fears-to-fathom-home-alone/\">\n\n    <meta charset=\"utf-8\" />\n    <meta http-equiv=\"Content-Type\" content=\"text/html; charset=utf-8\" />\n\n    <meta name=\"viewport\"\n        content=\"width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no\" />\n\n    <title>Fears To Fathom: Home Alone</title>\n\n    <style>\n        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n        }\n\n        body {\n            background: black;\n            overflow: hidden;\n            width: 100vw;\n            height: 100vh;\n            font-family: Arial, sans-serif;\n            color: white;\n        }\n\n        /* BACKGROUND */\n\n        #bg-canvas {\n            position: fixed;\n            inset: 0;\n            width: 100%;\n            height: 100%;\n            z-index: -2;\n            background: black;\n        }\n\n        /* LOADER */\n\n        #loader {\n            position: fixed;\n            inset: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            flex-direction: column;\n            gap: 22px;\n            z-index: 5;\n        }\n\n        #title {\n            font-size: 3em;\n            font-weight: bold;\n            text-align: center;\n\n            text-shadow:\n                0 0 5px #0ff,\n                0 0 10px #0ff,\n                0 0 20px #0ff,\n                0 0 30px #0ff;\n        }\n\n        /* PROGRESS BAR */\n\n        #progress-bar {\n            width: 420px;\n            max-width: 85vw;\n            height: 12px;\n\n            background: #111;\n            border-radius: 10px;\n            overflow: hidden;\n\n            box-shadow:\n                0 0 3px #0ff,\n                0 0 8px rgba(0, 255, 255, .4);\n        }\n\n        #progress-fill {\n            width: 0%;\n            height: 100%;\n\n            background: #0ff;\n            border-radius: 10px;\n\n            box-shadow:\n                0 0 4px #0ff,\n                0 0 10px rgba(0, 255, 255, .6);\n\n            transition: width .25s;\n        }\n\n        #loading-text {\n            font-size: 18px;\n\n            text-shadow:\n                0 0 4px #fff,\n                0 0 8px #fff;\n        }\n\n        /* UNITY */\n\n        .webgl-content {\n            position: fixed;\n            inset: 0;\n            width: 100%;\n            height: 100%;\n        }\n\n        #unityContainer {\n            position: absolute;\n            inset: 0;\n            width: 100%;\n            height: 100%;\n            display: none;\n        }\n    </style>\n\n    <script src=\"Build/UnityLoader.js\"><\/script>\n</head>\n\n<body>\n\n    <\!-- PARTICLE BACKGROUND -->\n\n    <canvas id=\"bg-canvas\"></canvas>\n\n    <\!-- LOADER -->\n\n    <div id=\"loader\">\n\n        <div id=\"title\">\n            Fears To Fathom\n        </div>\n\n        <div id=\"progress-bar\">\n            <div id=\"progress-fill\"></div>\n        </div>\n\n        <div id=\"loading-text\">\n            Preparing files...\n        </div>\n\n    </div>\n\n    <\!-- UNITY -->\n\n    <div class=\"webgl-content\">\n        <div id=\"unityContainer\"></div>\n    </div>\n\n    <script>\n        /* PARTICLE BACKGROUND */\n\n        const canvasBG = document.getElementById(\"bg-canvas\");\n        const ctx = canvasBG.getContext(\"2d\");\n\n        const MAX_PARTICLES = 50;\n        const MAX_DISTANCE = 100;\n\n        const COLORS = [\n            \"#00ffff\",\n            \"#ff00ff\",\n            \"#ffff00\",\n            \"#00ff00\",\n            \"#ff0080\"\n        ];\n\n        let particles = [];\n        let animationId;\n\n        function initBackground() {\n\n            canvasBG.width = window.innerWidth;\n            canvasBG.height = window.innerHeight;\n\n            particles = [];\n\n            for (let i = 0; i < MAX_PARTICLES; i++) {\n\n                particles.push({\n\n                    x: Math.random() * canvasBG.width,\n                    y: Math.random() * canvasBG.height,\n\n                    size: Math.random() * 3 + 1,\n\n                    speedX: (Math.random() - 0.5) * 1.2,\n                    speedY: (Math.random() - 0.5) * 1.2,\n\n                    color: COLORS[Math.floor(Math.random() * COLORS.length)]\n\n                });\n\n            }\n\n        }\n\n        function drawConnections() {\n\n            for (let a = 0; a < particles.length; a++) {\n\n                for (let b = a + 1; b < particles.length; b++) {\n\n                    const dx = particles[a].x - particles[b].x;\n                    const dy = particles[a].y - particles[b].y;\n\n                    const distance = Math.sqrt(dx * dx + dy * dy);\n\n                    if (distance < MAX_DISTANCE) {\n\n                        ctx.beginPath();\n\n                        const color = particles[a].color;\n\n                        ctx.strokeStyle = color;\n\n                        ctx.globalAlpha =\n                            0.5 - distance / (2 * MAX_DISTANCE);\n\n                        ctx.moveTo(\n                            particles[a].x,\n                            particles[a].y\n                        );\n\n                        ctx.lineTo(\n                            particles[b].x,\n                            particles[b].y\n                        );\n\n                        ctx.shadowBlur = 10;\n                        ctx.shadowColor = color;\n\n                        ctx.stroke();\n\n                        ctx.globalAlpha = 1;\n\n                    }\n\n                }\n\n            }\n\n        }\n\n        function animateBackground() {\n\n            ctx.clearRect(\n                0,\n                0,\n                canvasBG.width,\n                canvasBG.height\n            );\n\n            particles.forEach(p => {\n\n                p.x += p.speedX;\n                p.y += p.speedY;\n\n                if (p.x < 0 || p.x > canvasBG.width)\n                    p.speedX *= -1;\n\n                if (p.y < 0 || p.y > canvasBG.height)\n                    p.speedY *= -1;\n\n                ctx.beginPath();\n\n                ctx.arc(\n                    p.x,\n                    p.y,\n                    p.size,\n                    0,\n                    Math.PI * 2\n                );\n\n                ctx.fillStyle = p.color;\n\n                ctx.shadowColor = p.color;\n                ctx.shadowBlur = 8;\n\n                ctx.fill();\n\n            });\n\n            drawConnections();\n\n            animationId = requestAnimationFrame(\n                animateBackground\n            );\n\n        }\n\n        window.addEventListener(\"resize\", initBackground);\n\n        initBackground();\n        animateBackground();\n\n        /* LOADER */\n\n        const loadingText =\n            document.querySelector(\"#loading-text\");\n\n        const progressFill =\n            document.querySelector(\"#progress-fill\");\n\n        let max = 0;\n        let done = 0;\n\n        function updateProgress() {\n\n            let percent = (done / max) * 100;\n\n            progressFill.style.width =\n                percent + \"%\";\n\n            loadingText.textContent =\n                `Loading files... (${done}/${max})`;\n\n        }\n\n        function mergeFiles(fileParts) {\n\n            return new Promise((resolve, reject) => {\n\n                let buffers = [];\n\n                function fetchPart(index) {\n\n                    if (index >= fileParts.length) {\n\n                        let mergedBlob =\n                            new Blob(buffers);\n\n                        let mergedFileUrl =\n                            URL.createObjectURL(\n                                mergedBlob\n                            );\n\n                        resolve(mergedFileUrl);\n\n                        return;\n\n                    }\n\n                    fetch(fileParts[index])\n\n                        .then((response) =>\n                            response.arrayBuffer()\n                        )\n\n                        .then((data) => {\n\n                            buffers.push(data);\n\n                            done++;\n\n                            updateProgress();\n\n                            fetchPart(index + 1);\n\n                        })\n\n                        .catch(reject);\n\n                }\n\n                fetchPart(0);\n\n            });\n\n        }\n\n        function getParts(file, start, end) {\n\n            let parts = [];\n\n            for (let i = start; i <= end; i++) {\n\n                parts.push(\n                    file + \".part\" + i\n                );\n\n            }\n\n            max += (end - start + 1);\n\n            return parts;\n\n        }\n\n        function resizeUnityContainer() {\n\n            const container =\n                document.getElementById(\n                    \"unityContainer\"\n                );\n\n            container.style.width =\n                window.innerWidth + \"px\";\n\n            container.style.height =\n                window.innerHeight + \"px\";\n\n        }\n\n        Promise.all([\n\n            mergeFiles(\n                getParts(\n                    \"Build/FTFHAPort.data.unityweb\",\n                    1,\n                    39\n                )\n            ),\n\n        ]).then(([dataUrl]) => {\n\n            const json = {\n\n                companyName: \"Rayll\",\n\n                productName:\n                    \"Fears To Fathom\",\n\n                dataUrl: dataUrl,\n\n                wasmCodeUrl:\n                    \"FTFHAPort.wasm.code.unityweb\",\n\n                wasmFrameworkUrl:\n                    \"FTFHAPort.wasm.framework.unityweb\",\n\n                TOTAL_MEMORY: 536870912,\n\n                graphicsAPI: [\n                    \"WebGL 2.0\",\n                    \"WebGL 1.0\"\n                ],\n\n                webglContextAttributes: {\n                    preserveDrawingBuffer: false\n                },\n\n                splashScreenStyle: \"Dark\",\n\n                backgroundColor: \"#231F20\",\n\n                cacheControl: {\n                    default: \"must-revalidate\"\n                },\n\n            };\n\n            let blob = new Blob(\n                [JSON.stringify(json)],\n                {\n                    type: \"application/json\",\n                }\n            );\n\n            let blobUrl =\n                URL.createObjectURL(blob);\n\n            window.addEventListener(\n                \"resize\",\n                resizeUnityContainer\n            );\n\n            UnityLoader.instantiate(\n                \"unityContainer\",\n                json,\n                {\n                    url: blobUrl,\n\n                    Module: {\n\n                        onRuntimeInitialized: function () {\n\n                            resizeUnityContainer();\n\n                            document.getElementById(\n                                \"loader\"\n                            ).style.display = \"none\";\n\n                            cancelAnimationFrame(\n                                animationId\n                            );\n\n                            canvasBG.style.display =\n                                \"none\";\n\n                            document.getElementById(\n                                \"unityContainer\"\n                            ).style.display = \"block\";\n\n                        },\n\n                    },\n\n                }\n            );\n\n        });\n    <\/script>\n\n</body>\n\n</html>"},{"id":"3121f474-a7e5-4312-8239-38a9fb2be552","title":"Minecraft","description":"Minecraft is an open-ended \"sandbox\" game where players explore infinitely generated 3D worlds. Often described as digital LEGO, the game has no set storyline or required goals. Instead, you gather raw materials, craft tools, and choose your own path—whether that is building massive structures or surviving against monsters.","image":"https://res.cloudinary.com/jerrick/image/upload/v1677950799/64037f4fa963a2001cd7eeb2.jpg","type":"url","content":"https://takaiwebsite.neocities.org/minecraft"},{"id":"0c984809-e13f-491c-a250-731d13a981a0","title":"Buckshot","description":"Buckshot Roulette is a popular indie tabletop horror video game that re-imagines Russian roulette by replacing the traditional revolver with a 12-gauge pump-action shotgun. Developed by Mike Klubnika, the high-stakes strategy game pits you against a mysterious AI opponent known as \"The Dealer\" in a tense, gritty underground nightclub.","image":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAkGBxQTEhUTExQWFhUXGRAPGRgYGQ8cGw8aHRUWGRUZHhUbHyggIR4lIBUVITEhJSkrLi4uHR8zODMtNygtLisBCgoKDg0OFxAQFysdFR0rLS0rLSstKystKy0tLS0tLSstKy0rLS0tLS0rLS03LSstKy0tNy0rLS0tKy0tKy0rK//AABEIAKgBLAMBIgACEQEDEQH/xAAcAAABBQEBAQAAAAAAAAAAAAAFAAMEBgcCAQj/xABNEAACAQIEAwUDCQUEBwYHAAABAgMAEQQSITEFQVEGEyJhcTKBkQcUI0JSobHB0WJykuHwFTNTghZDorLC0vEkJTVzg5MXNGNldcPE/8QAGQEAAwEBAQAAAAAAAAAAAAAAAQIDAAQF/8QAJBEAAwACAwACAgMBAQAAAAAAAAECAxESITFBURMiBGFxMjP/2gAMAwEAAhEDEQA/AMd4hhSuvKiPZzsdjccrthYe8VDlY54VCki/12HKouPZj4Wt7s3h+NW/5IwQ3ElOzcPxnobZP+b76WWVyS/SucQ7LYnCYqKDERlJHMZQAoQ4LWBDg5bX03052olxvsfj4pIxNh2TvZFghBeDxudl0cgHzOnnRvin0vBuEyObuhx8AJ+wHsB6ABRUb5UMUSnDyxJduG8P319rvc515mwufSi+xJri9orXHOCSYRjDiY2SbL3mUlPAD7JJUm+x50f4h8nuJw+EGKmh8AVC4VwZIs1rFkvpqRoLkX1G9iHB+HfOu0Kh9U7/AL1rn2u7j70DXceAD0ND17SuZuIM7EjGJiY8oFzmJL4djb7NgoPINS+FNuvPSH/oBi2hSeLDu0biORZDJhQuViAN2BBuQLGxFNcS7G42BlhmgKSTZViXPCxkPeIoHhYgauN7VZeF4R5eDRYdmbx8UENs1wqthAxvfZQWLkdbmpPAMc2L4qsgzG4xXcjxfRomGl+bKL7EAKf3rnc0fRd8dple492TmwjxQSxq0soWOEB0McjMQmjXAvmtfNa2/nQriXYXHwSQxzQZHnZoogZMP9IwtcXz2HtDU2BvUnicgmwmEhvYQNi7AfYfunXy1fvf6Io/8ruH7zFwsWIK4PBNp/6hoiN7KX2j7LYrAFBi4u6MgYqM8TFgtgT4GNt+fnU7/QDG/Mvn3dDucve2zLn7r/Fyb5PPe2tra1cvlJ4SMTxwRsWOdsBBYfVDiMMfTxk/GiGH4iP9Ii4P0bStwsp9TuwvcCPLyXOA1utYBlvZ/s7isXnOFiaUx5CwUrmXNfKcpNyNDtRniHYjHCJ5p8M8PdjMztlCMCQo5+1cjanuI4+ThgxeHw0ksMjYhYi6NlPdwmZbZ18QJLxk2OtvWrb8rPaSSPF4zDPJIYZcJAqR3JVZO8ifNl2Bsr3PnRMY9NCymzCxruDFOnssR5cvhT0WN0yyDOvL7S+hr04INrEwb9k6N/OsYfwvE0zDvoldedtDUoxYF9RJLEehXMB5C1C8JgmkfILA8yxsEA3JJ2AqdNi44QUhUFgdZXALafZUiyj76A8p62/AknZVHUOkxCnYsjDMbA87cmHxFeL2MlIurqV6hZbe+woLDj3Myu7ljdfE3iy+Yv03Fabg8e5uqMdPCbfWYaC/x+NrVOuSKxMV8FKn7Jd2PpZlj/eSQb3tvb7JrxOzsOUucRnUbmNGOXS+tr8qsnG+HtOo7120y5bljoL7A7DW  / 300 MB</div>\n    <div id=\"bar\">\n      <div id=\"fill\"></div>\n    </div>\n  </div>\n\n  <canvas id=\"unity-canvas\"></canvas>\n\n  <script src=\"Build/bb0d9ecdb05db3e84da20bd14a4f84dc.loader.js\"><\/script>\n\n  <script>\n    const baseBuild = \"https://cdn.jsdelivr.net/gh/Reeyuki/PlagueIncEvolved/Build/\"\n    const base = \"https://cdn.jsdelivr.net/gh/Reeyuki/PlagueIncEvolved/\"\n\n    let loaded = 0\n    let totalGuess = 317 * 1024 * 1024\n\n    function update() {\n      const mb = (loaded / 1024 / 1024).toFixed(1)\n      const total = (totalGuess / 1024 / 1024).toFixed(0)\n      document.getElementById(\"text\").textContent = mb + \" MB / \" + total + \" MB\"\n      document.getElementById(\"fill\").style.width = (loaded / totalGuess * 100) + \"%\"\n    }\n\n    async function fetchPart(url) {\n      const res = await fetch(url)\n      if (!res.ok) return null\n      const buf = await res.arrayBuffer()\n      loaded += buf.byteLength\n      update()\n      return new Uint8Array(buf)\n    }\n\n    /* CONFIG ONLY */\n    const files = [\n      { name: \"6b69ec426bff8a6bd4e760a1d5f507b9.wasm\", parts: 2 },\n      { name: \"3719aa6c33bf126ed64864ee5fc2fafc.data\", parts: 15 }\n    ]\n\n    function buildUrls(file) {\n      const urls = []\n      for (let i = 0; i < file.parts; i++) {\n        urls.push(baseBuild + file.name + \".part\" + String(i).padStart(2, \"0\"))\n      }\n      return urls\n    }\n\n    async function loadFile(file) {\n      const urls = buildUrls(file)\n\n      const buffers = await Promise.all(urls.map(fetchPart))\n\n      let size = 0\n      for (const b of buffers) size += b.byteLength\n\n      const out = new Uint8Array(size)\n      let off = 0\n\n      for (const b of buffers) {\n        out.set(b, off)\n        off += b.byteLength\n      }\n\n      return out.buffer\n    }\n\n    async function start() {\n      const wasmFile = files[0]\n      const dataFile = files[1]\n\n      const wasmPromise = loadFile(wasmFile)\n      const dataPromise = loadFile(dataFile)\n\n      const [wasm, data] = await Promise.all([wasmPromise, dataPromise])\n\n      const wasmUrl = URL.createObjectURL(new Blob([wasm], { type: \"application/wasm\" }))\n      const dataUrl = URL.createObjectURL(new Blob([data]))\n\n      document.getElementById(\"loader\").style.display = \"none\"\n\n      createUnityInstance(document.querySelector(\"#unity-canvas\"), {\n        dataUrl: dataUrl,\n        frameworkUrl: baseBuild + \"b4b58f3ff6d98fbfb83482e25e0e9a5c.framework.js\",\n        codeUrl: wasmUrl,\n        streamingAssetsUrl: base + \"StreamingAssets\",\n        companyName: \"Ndemic Creations\",\n        productName: \"Plague Inc\",\n        productVersion: \"1.18.3.2\"\n      })\n    }\n\n    start()\n  <\/script>\n\n</body>\n\n</html>"}]</script>
<script>
  const GAMES = JSON.parse(document.getElementById('games-data').textContent);
  document.getElementById('count').textContent = GAMES.length;
  const grid = document.getElementById('grid');
  GAMES.forEach((g,i) => {
    const c = document.createElement('button');
    c.className = 'card';
    c.innerHTML = `
      <div class="thumb">${g.image ? `<img src="${g.image}" alt="" loading="lazy"/>` : `<span class="ph">${(g.title||'?').slice(0,2).toUpperCase()}</span>`}</div>
      <div class="body"><h3></h3><p></p><div class="play">▶ Play now</div></div>`;
    c.querySelector('h3').textContent = g.title;
    c.querySelector('p').textContent = g.description || '';
    c.onclick = () => openGame(i);
    grid.appendChild(c);
  });
  const modal = document.getElementById('modal');
  const frame = document.getElementById('frame');
  function openGame(i){
    const g = GAMES[i];
    document.getElementById('mtitle').textContent = g.title;
    if (g.type === 'url') { frame.removeAttribute('srcdoc'); frame.src = g.content; }
    else { frame.removeAttribute('src'); frame.srcdoc = g.content; }
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeGame(){
    modal.classList.remove('open');
    frame.removeAttribute('src'); frame.removeAttribute('srcdoc');
    document.body.style.overflow = '';
  }
  function fs(){ (frame.requestFullscreen||frame.webkitRequestFullscreen).call(frame); }
  document.addEventListener('keydown', e => { if(e.key==='Escape' && modal.classList.contains('open')) closeGame(); });
</script>
