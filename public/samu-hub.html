<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Samu Game Hub</title>
<meta name="description" content="Play HTML5 games — Samu Game Hub single-file edition." />
<style>
  :root{--bg:#0b0608;--fg:#f5e9eb;--muted:#a08a8e;--primary:#e63946;--ember:#ff7a3d;--card:#15090c;--border:#2a141a}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  a{color:inherit;text-decoration:none}
  header{display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(11,6,8,.85);backdrop-filter:blur(8px);z-index:10}
  .logo{font-weight:900;font-size:20px}.logo span{color:var(--primary)}
  nav a{margin-left:18px;color:var(--muted);font-size:14px}nav a:hover{color:var(--fg)}
  .hero{position:relative;overflow:hidden;border-bottom:1px solid var(--border);padding:72px 28px}
  .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(230,57,70,.35),transparent 60%)}
  .hero-inner{position:relative;max-width:1100px;margin:0 auto}
  .chip{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(230,57,70,.4);background:rgba(230,57,70,.1);color:var(--primary);padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.18em}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--primary);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  h1{font-size:clamp(36px,6vw,72px);line-height:.95;margin:16px 0 0;font-weight:900;letter-spacing:-.02em}
  h1 .grad{background:linear-gradient(135deg,var(--primary),var(--ember));-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{max-width:560px;margin-top:18px;color:var(--muted);font-size:17px}
  main{max-width:1200px;margin:0 auto;padding:48px 28px}
  h2{font-size:26px;margin:0 0 20px;font-weight:900}h2 .accent{color:var(--primary)}
  .grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .card{border:1px solid var(--border);background:var(--card);border-radius:14px;overflow:hidden;cursor:pointer;transition:.25s;display:flex;flex-direction:column;text-align:left;font:inherit;color:inherit;padding:0}
  .card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 12px 40px -10px rgba(230,57,70,.5)}
  .thumb{aspect-ratio:16/9;background:#1a0d11;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .thumb img{width:100%;height:100%;object-fit:contain}
  .thumb .ph{font-size:38px;font-weight:900;color:rgba(230,57,70,.35)}
  .body{padding:14px 16px 16px}
  .body h3{margin:0 0 6px;font-size:16px}
  .body p{margin:0;color:var(--muted);font-size:13px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .play{margin-top:10px;color:var(--primary);font-weight:700;font-size:13px}
  footer{border-top:1px solid var(--border);padding:24px;text-align:center;color:var(--muted);font-size:13px;margin-top:40px}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:none;flex-direction:column}
  .modal.open{display:flex}
  .bar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);background:#0b0608}
  .bar h3{margin:0;font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--fg);cursor:pointer;font-weight:700;font-size:13px}
  .btn.primary{background:linear-gradient(135deg,var(--primary),var(--ember));border:none;color:#fff}
  .frame{flex:1;width:100%;border:0;background:#000}
</style>
</head>

\n        function p8_assign_gamepad_to_player(gamepad_index, player_index) {\n            p8_unassign_gamepad(gamepad_index);\n            pico8_gamepads_mapping[gamepad_index] = player_index;\n        }\n    \n    \n    \n        function p8_convert_standard_gamepad_to_button_state(gamepad, axis_threshold, button_threshold) {\n            // Given a gamepad object, return:\n            // {\n            //     button_state: the binary encoded Pico 8 button state\n            //     menu_button: true if any menu-mapped button was pressed\n            //     any_button: true if any button was pressed, including d-pad\n            //         buttons and unmapped buttons\n            // }\n            if (!gamepad || !gamepad.axes || !gamepad.buttons) {\n                return {\n                    button_state: 0,\n                    menu_button: false,\n                    any_button: false\n                };\n            }\n            function button_state_from_axis(axis, low_state, high_state, default_state) {\n                if (axis && axis < -axis_threshold) return low_state;\n                if (axis && axis > axis_threshold) return high_state;\n                return default_state;\n            }\n            var axes_actions = [\n                button_state_from_axis(gamepad.axes[0], P8_DPAD_LEFT, P8_DPAD_RIGHT, P8_NO_ACTION),\n                button_state_from_axis(gamepad.axes[1], P8_DPAD_UP, P8_DPAD_DOWN, P8_NO_ACTION),\n            ];\n    \n            var button_actions = gamepad.buttons.map(function (button, index) {\n                var pressed = button.value > button_threshold || button.pressed;\n                if (!pressed) return P8_NO_ACTION;\n                return P8_BUTTON_MAPPING[index] || P8_NO_ACTION;\n            });\n    \n            var all_actions = axes_actions.concat(button_actions);\n            \n            var menu_button = button_actions.some(function (action) { return action.action == 'menu'; });\n            var button_state = (all_actions\n                .filter(function (a) { return a.action == 'button'; })\n                .map(function (a) { return a.code; })\n                .reduce(function (result, code) { return result | code; }, 0)\n            );\n            var any_button = gamepad.buttons.some(function (button) {\n                return button.value > button_threshold || button.pressed;\n            });\n    \n            any_button |= button_state; //jww: include axes 0,1 as might be first intended action\n    \n            return {\n                button_state,\n                menu_button,\n                any_button\n            };\n        }\n    \n        // jww: pico-8 0.2.1 version for unmapped gamepads, following p8_convert_standard_gamepad_to_button_state\n        // axes 0,1 & buttons 0,1,2,3 are reasonably safe. don't try to read dpad.\n        // menu buttons are unpredictable, but use 6..8 anyway (better to have a weird menu button than none)\n    \n        function p8_convert_unmapped_gamepad_to_button_state(gamepad, axis_threshold, button_threshold) {\n    \n            if (!gamepad || !gamepad.axes || !gamepad.buttons) {\n                return {\n                    button_state: 0,\n                    menu_button: false,\n                    any_button: false\n                };\n            }\n    \n            var button_state = 0;\n    \n            if (gamepad.axes[0] && gamepad.axes[0] < -axis_threshold) button_state |= 0x1;\n            if (gamepad.axes[0] && gamepad.axes[0] > axis_threshold)  button_state |= 0x2;\n            if (gamepad.axes[1] && gamepad.axes[1] < -axis_threshold) button_state |= 0x4;\n            if (gamepad.axes[1] && gamepad.axes[1] > axis_threshold)  button_state |= 0x8;\n    \n            // buttons: first 4 taken to be O/X, 6..8 taken to be menu button\n    \n            for (j = 0; j < gamepad.buttons.length; j++)\n            if (gamepad.buttons[j].value > 0 || gamepad.buttons[j].pressed)\n            {\n                if (j < 4)\n                    button_state |= (0x10 << (((j+1)/2)&1)); // 0 1 1 0 -- A,X -> O,X on xbox360\n                else if (j >= 6 && j <= 8)\n                    button_state |= 0x40;\n            }\n    \n            var menu_button = button_state & 0x40;\n    \n            var any_button = gamepad.buttons.some(function (button) {\n                return button.value > button_threshold || button.pressed;\n            });\n    \n            any_button |= button_state; //jww: include axes 0,1 as might be first intended action\n            \n            return {\n                button_state,\n                menu_button,\n                any_button\n            };\n        }\n    \n        \n        // gamepad  https://developer.mozilla.org/en-US/docs/Web/API/Gamepad_API/Using_the_Gamepad_API\n        // (sets bits in pico8_buttons[])\n        function p8_update_gamepads() {\n            var axis_threshold = 0.3;\n            var button_threshold = 0.5; // Should be unnecessary, we should be able to trust .pressed\n            var max_players = 8;\n            var gps = navigator.getGamepads() || navigator.webkitGetGamepads();\n    \n            if (!gps) return;\n    \n            // In Chrome, gps is iterable but it's not an array.\n            gps = Array.from(gps);\n    \n            pico8_gamepads.count = gps.length;\n            while (gps.length > pico8_gamepads_mapping.length) {\n                pico8_gamepads_mapping.push(null);\n            }\n    \n            var menu_button = false;\n            var gamepad_states = gps.map(function (gp) {\n                return (gp && gp.mapping == \"standard\") ?\n                    p8_convert_standard_gamepad_to_button_state(gp, axis_threshold, button_threshold) :\n                    p8_convert_unmapped_gamepad_to_button_state(gp, axis_threshold, button_threshold);\n            });\n    \n            // Unassign disconnected gamepads.\n            // gps.forEach(function (gp, i) { if (gp && !gp.connected) { p8_unassign_gamepad(i); }});\n            gps.forEach(function (gp, i) { if (!gp || !gp.connected) { p8_unassign_gamepad(i); }}); // https://www.lexaloffle.com/bbs/?pid=87132#p\n    \n    \n            // Assign unassigned gamepads when any button is pressed.\n            gamepad_states.forEach(function (state, i) {\n                if (state.any_button && pico8_gamepads_mapping[i] == null) {\n                    var first_free_player = p8_first_player_without_gamepad(max_players);\n                    p8_assign_gamepad_to_player(i, first_free_player);\n                }\n            });\n    \n            // Update pico8_buttons array.\n            gamepad_states.forEach(function (gamepad_state, i) {\n                if (pico8_gamepads_mapping[i] != null) {\n                    pico8_buttons[pico8_gamepads_mapping[i]] = gamepad_state.button_state;\n                }\n            });\n    \n            // Update menu button.\n            // Pico 8 only recognises the menu button on the first player, so we\n            // press it when any gamepad has pressed a button mapped to menu.\n            if (gamepad_states.some(function (state) { return state.menu_button; })) {\n                pico8_buttons[0] |= 0x40;\n            }\n    \n            requestAnimationFrame(p8_update_gamepads);\n        }\n        requestAnimationFrame(p8_update_gamepads);\n    \n        // End of gamepad code\n    \n    \n        // key blocker. prevent browser operations while playing cart so that PICO-8 can use those keys e.g. cursors to scroll, ctrl-r to reload\n        document.addEventListener('keydown',\n        function (event) {\n            event = event || window.event;\n            if (!p8_is_running) return;\n    \n            if (pico8_state.has_focus == 1)\n                if ([32, 37, 38, 39, 40, 77, 82, 80, 9].indexOf(event.keyCode) > -1)       // block only cursors, M R P, tab\n                    if (event.preventDefault) event.preventDefault();\n    \n        },{passive: false});\n    \n        // when using codo_textarea to determine focus, need to explicitly hand focus back when clicking a p8_menu_button\n        function p8_give_focus()\n        {\n            el = (typeof codo_textarea === 'undefined') ? document.getElementById(\"codo_textarea\") : codo_textarea;\n            if (el)\n            {\n                el.focus();\n                el.select();\n            }\n        }\n    \n        function p8_request_fullscreen() {\n    \n            var is_fullscreen=(document.fullscreenElement || document.mozFullScreenElement || document.webkitIsFullScreen || document.msFullscreenElement);\n    \n            if (is_fullscreen)\n            {\n                 if (document.exitFullscreen) {\n                    document.exitFullscreen();\n                } else if (document.webkitExitFullscreen) {\n                    document.webkitExitFullscreen();\n                } else if (document.mozCancelFullScreen) {\n                    document.mozCancelFullScreen();\n                } else if (document.msExitFullscreen) {\n                    document.msExitFullscreen();\n                }\n                return;\n            }\n            \n            var el = document.getElementById(\"p8_playarea\");\n    \n            if ( el.requestFullscreen ) {\n                el.requestFullscreen();\n            } else if ( el.mozRequestFullScreen ) {\n                el.mozRequestFullScreen();\n            } else if ( el.webkitRequestFullScreen ) {\n                el.webkitRequestFullScreen( Element.ALLOW_KEYBOARD_INPUT );\n            }\n        }\n    \n    <\/script>\n    \n    <STYLE TYPE=\"text/css\">\n    <\!--\n    .p8_menu_button{\n        opacity:0.3;\n        padding:4px;\n        display:table;\n        width:24px;\n        height:24px;\n        float:right;\n    }\n    \n    @media screen and (min-width:512px) {\n        .p8_menu_button{\n            width:24px; margin-left:8px; margin-bottom:8px;\n        }\n    }\n    .p8_menu_button:hover{\n        opacity:1.0;\n        cursor:pointer;\n    }\n    \n    canvas{\n        image-rendering: optimizeSpeed;\n        image-rendering: -moz-crisp-edges;\n        image-rendering: -webkit-optimize-contrast;\n        image-rendering: optimize-contrast;\n        image-rendering: pixelated;\n        -ms-interpolation-mode: nearest-neighbor;\n        border: 0px;\n        cursor: none;\n    }\n    \n    \n    .p8_start_button{\n        image-rendering: pixelated;\n        image-rendering: -moz-crisp-edges;\n        image-rendering: crisp-edges;\n        cursor:pointer;\n        background:url(\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAADICAIAAAAiOjnJAAAABGdBTUEAALGPC/xhBQAAAiJJREFUeF7t0IEAAAAAw6D5Ux/khVBhwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDBgwIABAwYMGDDwMDDVlwABBWcSrQAAAABJRU5ErkJggg==\");\n        -repeat center;\n        -webkit-background-size:cover; -moz-background-size:cover; -o-background-size:cover; background-size:cover;\n    }\n    \n    .button_gfx{\n        stroke-width:2;\n        stroke: #ffffff;\n        stroke-opacity:0.4;\n        fill-opacity:0.2;\n        fill:black;\n    }\n    \n    .button_gfx_icon{\n        stroke-width:3;\n        stroke: #909090;\n        stroke-opacity:0.7;\n        fill:none;\n    }\n    \n    -->\n    </STYLE>\n    \n    </head>\n    \n    <body style=\"padding:0px; margin:0px; color:#ccc\">\n    <div id=\"body_0\"> <\!-- hide this when playing in mobile (p8_touch_detected) so that elements don't affect layout -->\n    \n    \n    <\!-- Add any content above the cart here -->\n    \n    \n    <div id=\"p8_frame_0\" style=\"max-width:800px; max-height:800px; margin:auto;\"> <\!-- double function: limit size, and display only this div for touch devices -->\n    <div id=\"p8_frame\" style=\"display:flex; width:100%; max-width:100vw; height:100vw; max-height:100vh; margin:auto;\">\n    \n        <div id=\"p8_menu_buttons_touch\" style=\"position:absolute; width:100%; z-index:10; left:0px;\">\n            <div class=\"p8_menu_button\" id=\"p8b_full\"  style=\"float:left;margin-left:10px\" onClick=\"p8_give_focus(); p8_request_fullscreen();\"></div>\n            <div class=\"p8_menu_button\" id=\"p8b_sound\" style=\"float:left;margin-left:10px\" onClick=\"p8_give_focus(); p8_create_audio_context(); Module.pico8ToggleSound();\"></div>\n            <div class=\"p8_menu_button\" id=\"p8b_close\" style=\"float:right; margin-right:10px\" onClick=\"p8_close_cart();\"></div>\n        </div>\n    \n        <div id=\"p8_container\"\n            style=\"margin:auto; display:table;\"\n            onclick=\"p8_create_audio_context(); p8_run_cart();\">\n    \n            <div id=\"p8_start_button\" class=\"p8_start_button\" style=\"width:100%; height:100%; display:flex;\">\n                <img width=80 height=80 style=\"margin:auto;\"\n            src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAFAAAABQCAYAAACOEfKtAAABpklEQVR42u3au23DQBCEYUXOXIGKcujQXUgFuA0XIKgW90Q9oEAg+Ljd27vd2RsCf058gEDqhofPj+OB6SMCAQlIQAIyAhKQgARkBAQDnM6XSRsB7/2e/tSA0//12fCAKsQX3ntDA4oRFwBRIc0AixE38BAhTQGLEAsBUSDNAXcRhYDRIZsAPlp99VECRoXsDpgN0g0wC6Q7IDpkGEBUyG6A0+vKBtkdMBukG2AWSHdAdMgwgKiQ4QDRIMMCokCGB4wOCQPYFVKw2cABNocUjl6wgE0gFashPKAZpHJ2TQNYBVmxW6cDFENWDv9pAUshCVgJScBKSAISkD9hPkT4GkNAMdzepyj8Kye852EBLe51CZHHWQK4JcThD1SlcHPEYY/0a+A0n6SkGZV6w6WZNb3g4Id1b7hwgGhwYQBR4dwB0eHcALPAdQfMBhcOEA0uDCAqnDsgOpwbYBa4poA/31+rZYFrBriFpwGMCtcEcA9PAhgdzhywBK8EEQXOFFCCtwaIBmcGKMWbI6LCmQBq8R6hw5kAMgISkIAEJCAjIAEJSEBGQI9ukV7lRn9nD+gAAAAASUVORK5CYII=\"/>\n            </div>\n    \n            <div id=\"p8_playarea\" style=\"display:none; margin:auto;\n                    -webkit-user-select:none; -moz-user-select: none; user-select: none; -webkit-touch-callout:none;\n            \">\n    \n                <div  id=\"touch_controls_background\"\n                      style=\" pointer-events:none; display:none; background-color:#000;\n                             position:fixed; top:0px; left:0px; border:0; width:100vw; height:100vh\">\n                    &nbsp\n                </div>\n    \n                <div style=\"display:flex; position:relative\">\n                    <\!-- pointer-events turned off for mobile in p8_update_layout because need for desktop mouse -->\n                    <canvas class=\"emscripten\" id=\"canvas\" oncontextmenu=\"event.preventDefault();\" >\n                    </canvas>\n                    <div class=p8_menu_buttons id=\"p8_menu_buttons\" style=\"margin-left:10px;\">\n                        <div class=\"p8_menu_button\" style=\"position:absolute; bottom:125px\" id=\"p8b_controls\" onClick=\"p8_give_focus(); Module.pico8ToggleControlMenu();\"></div>\t\t\t\t\t\n                        <div class=\"p8_menu_button\" style=\"position:absolute; bottom:90px\" id=\"p8b_pause\" onClick=\"p8_give_focus(); Module.pico8TogglePaused(); p8_update_layout_hash = -22;\"></div>\n                        <div class=\"p8_menu_button\" style=\"position:absolute; bottom:55px\" id=\"p8b_sound\" onClick=\"p8_give_focus(); p8_create_audio_context(); Module.pico8ToggleSound();\"></div>\n                        <div class=\"p8_menu_button\" style=\"position:absolute; bottom:20px\" id=\"p8b_full\" onClick=\"p8_give_focus(); p8_request_fullscreen();\"></div>\n                    </div>\n                </div>\n    \n    \n                <\!-- display after first layout update -->\n                <div  id=\"touch_controls_gfx\"\n                      style=\" pointer-events:none; display:table; \n                             position:fixed; top:0px; left:0px; border:0; width:100vw; height:100vh\">\n    \n                        <img src=\"\" id=\"controls_right_panel\" style=\"position:absolute; opacity:0.5;\">\n                        <img src=\"\" id=\"controls_left_panel\" style=\"position:absolute;  opacity:0.5;\">\n                            \n                \n                </div> <\!-- touch_controls_gfx -->\n    \n                <\!-- used for clipboard access & keyboard input; displayed and used by PICO-8 only once needed. can be safely removed if clipboard / key presses not needed. -->\n                <\!-- (needs to be inside p8_playarea so that it still works under Chrome when fullscreened) -->\n                <\!-- 0.2.5: added \"display:none\"; pico8.js shows on demand to avoid mac osx accent character selector // https://www.lexaloffle.com/bbs/?tid=47743 -->\n    \n                <textarea id=\"codo_textarea\" class=\"emscripten\" style=\"display:none; position:absolute; left:-9999px; height:0px; overflow:hidden\"></textarea>\n    \n            </div> <\!--p8_playarea -->\n    \n        </div> <\!-- p8_container -->\n    \n    </div> <\!-- p8_frame -->\n    </div> <\!-- p8_frame_0 size limit -->\n    \n    <script type=\"text/javascript\">\n    \n        p8_update_layout();\n        p8_update_button_icons();\n    \n        var canvas = document.getElementById(\"canvas\");\n        Module = {};\n        Module.canvas = canvas;\n    \n        // from @ultrabrite's shell: test if an AudioContext can be created outside of an event callback.\n        // If it can't be created, then require pressing the start button to run the cartridge\n    \n        if (p8_autoplay)\n        {\n            var temp_context = new AudioContext();\n            temp_context.onstatechange = function ()\n            {\n                if (temp_context.state=='running')\n                {\n                    p8_run_cart();\n                    temp_context.close();\n                }\n            };\n        }\n    \n        // pointer lock request needs to be inside a canvas interaction event\n        // pico8_state.request_pointer_lock is true when 0x5f2d bit 0 and bit 2 are set -- poke(0x5f2d,0x5) \n        canvas.addEventListener(\"click\", function()\n        {\n            if (!p8_touch_detected)\n                if (pico8_state.request_pointer_lock)\n                    canvas.requestPointerLock();\n        });\n        \n    <\/script>\n    \n    \n    \n    <\!-- Add content below the cart here -->\n    \n    \n    \n    \n    </div> <\!-- body_0 -->\n    </body></html>\n    \n    <script defer src=\"\" type=\"text/javascript\"><\/script>"},{"id":"e6e56c67-78b7-48f8-a9e4-4ea5ba425be2","title":"Totally Accurate Battle Simulator","description":"TABS is an acronym for Totally Accurate Battle Simulator, a wildly popular physics-based tactical strategy game developed and published by Landfall Games.","image":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyxjrPZ1cTA29-9A_TWkD8Mv1seFNubyz8YA&s","type":"html","content":"<!DOCTYPE html>\n<html lang=\"en-us\">\n  <head>\n    <base href=\"https://cdn.jsdelivr.net/gh/web-ports/tabs@main/\">\n    <meta charset=\"utf-8\">\n    <meta http-equiv=\"Content-Type\" content=\"text/html; charset=utf-8\">\n    <title>Unity WebGL Player | TABS</title>\n    <style>\n      body {\n        background-color: black;\n        margin: 0;\n        padding: 0;\n        overflow: hidden;\n      }\n      #gameContainer {\n        width: 100vw !important;\n        height: 100vh !important;\n      }\n      canvas {\n        width: 100% !important;\n        height: 100% !important;\n      }\n#loading-text {\n  font-weight: bold;\n  background: linear-gradient(\n    270deg,\n    #ff0000,\n    #ff7f00,\n    #ffff00,\n    #00ff00,\n    #0000ff,\n    #4b0082,\n    #8f00ff\n  );\n  background-size: 400% 400%;\n  -webkit-background-clip: text;\n  -webkit-text-fill-color: transparent;\n  animation: rainbow 3s ease infinite;\n}\n\n@keyframes rainbow {\n  0% { background-position: 0% 50%; }\n  50% { background-position: 100% 50%; }\n  100% { background-position: 0% 50%; }\n}\n    </style>\n  </head>\n  <body>\n<div id=\"loading-text\"\n    style=\"color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;\"> LOADING...\n  </div>\n    <div id=\"gameContainer\"></div>\n    <script src=\"Build/UnityLoader.js\"><\/script>\n    <script>\nvar loadingText = document.querySelector(\"#loading-text\");\n    let totalBytes = 0;\n    let loadedBytes = 0;\n\n    async function fetchWithProgress(url) {\n      const response = await fetch(url);\n      const reader = response.body.getReader();\n      let chunks = [];\n      let received = 0;\n      while (true) {\n        const {\n          done,\n          value\n        } = await reader.read();\n        if (done) break;\n        received += value.length;\n        loadedBytes += value.length;\n        chunks.push(value);\n        let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);\n        let mbTotal = '1746.00';\n        loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;\n      }\n      let fullBuffer = new Uint8Array(received);\n      let offset = 0;\n      for (let chunk of chunks) {\n        fullBuffer.set(chunk, offset);\n        offset += chunk.length;\n      }\n      return fullBuffer.buffer;\n    }\n\n    async function mergeFiles(fileParts, cacheKey) {\n      const cache = await caches.open(\"tabs-cache\");\n      const cachedResponse = await cache.match(cacheKey);\n      if (cachedResponse) {\n        const blob = await cachedResponse.blob();\n        return URL.createObjectURL(blob);\n      }\n      const buffers = await Promise.all(\n        fileParts.map(part => fetchWithProgress(part))\n      );\n      const mergedBlob = new Blob(buffers);\n      const response = new Response(mergedBlob);\n      await cache.put(cacheKey, response);\n      return URL.createObjectURL(mergedBlob);\n    }\n\n    function getParts(file, start, end) {\n      let parts = [];\n      for (let i = start; i <= end; i++) {\n        parts.push(file + \".part\" + i);\n      }\n      return parts;\n    }\n    (async () => {\n      const [dataUrl, wasmUrl, asmUrl] = await Promise.all([\n        mergeFiles(getParts(\"Build/tabs.data.unityweb\", 1, 86), \"tabs.data.unityweb\"),\n        mergeFiles(getParts(\"Build/tabs.wasm.code.unityweb\", 1, 3), \"tabs.wasm.code.unityweb\"),\n      ]);\n\n      const originalOpen = XMLHttpRequest.prototype.open;\n      XMLHttpRequest.prototype.open = function (method, url, ...rest) {\n          if (url.includes(\"tabs.data.unityweb\")) {\n              url = dataUrl;\n          } else if (url.includes(\"tabs.wasm.code.unityweb\")) {\n              url = wasmUrl;\n          }\n          return originalOpen.call(this, method, url, ...rest);\n      };\n      var unityInstance = UnityLoader.instantiate(\"gameContainer\", \"Build/tabs.json\");\n      loadingText.remove();\n    })();\n    <\/script>\n  </body>\n</html>"},{"id":"06f0bfc6-3f23-4bb1-8af0-a01ab1796b05","title":"Slender Man","description":"Slender is a seminal psychological survival horror game where you navigate a dark forest to collect eight scattered pages while evading a tall, faceless entity. Armed only with a flashlight, you must manage your stamina and flashlight battery, as making eye contact with Slender Man for too long results in a game over.","image":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS5H0vuhVRpEYZ1i8qPLOGCvhzyfYXDQ5Jxnw&s","type":"html","content":"<!DOCTYPE html>\n<html lang=\"en-us\">\n\n<head>\n    <base href=\"https://cdn.jsdelivr.net/gh/genizy/web-port@main/slender/\">\n    <meta charset=\"utf-8\">\n    <meta http-equiv=\"Content-Type\" content=\"text/html; charset=utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n    <title>Unity WebGL Player | Slender</title>\n    <link rel=\"shortcut icon\" href=\"TemplateData/favicon.ico\">\n    <style>\n        * {\n            margin: 0;\n            padding: 0;\n            border: 0;\n            overflow: hidden;\n        }\n\n        body {\n            background: #000;\n            position: fixed;\n            width: 100%;\n            height: 100%;\n        }\n\n        .webgl-content {\n            position: absolute;\n            width: 100%;\n            height: 100%;\n        }\n\n        #unityContainer {\n            position: absolute;\n            width: 100%;\n            height: 100%;\n        }\n\n        .footer {\n            position: absolute;\n            bottom: 0;\n            width: 100%;\n            text-align: center;\n            padding: 10px 0;\n            background: rgba(0, 0, 0, 0.5);\n            z-index: 100;\n        }\n\n        .fullscreen {\n            cursor: pointer;\n            display: inline-block;\n            width: 24px;\n            height: 24px;\n            background: url('TemplateData/fullscreen.png') no-repeat center;\n        }\n    </style>\n    <script src=\"TemplateData/UnityProgress.js\"><\/script>\n    <script src=\"Build/UnityLoader.js\"><\/script>\n    <script>\n        function mergeFiles(fileParts) {\n            return new Promise((resolve, reject) => {\n                let buffers = [];\n\n                function fetchPart(index) {\n                    if (index >= fileParts.length) {\n                        let mergedBlob = new Blob(buffers);\n                        let mergedFileUrl = URL.createObjectURL(mergedBlob);\n                        resolve(mergedFileUrl);\n                        return;\n                    }\n                    fetch(fileParts[index]).then((response) => response.arrayBuffer()).then((data) => {\n                        buffers.push(data);\n                        fetchPart(index + 1);\n                    }).catch(reject);\n                }\n                fetchPart(0);\n            });\n        }\n\n        function getParts(file, start, end) {\n            let parts = [];\n            for (let i = start; i <= end; i++) {\n                parts.push(file + \".part\" + i);\n            }\n            return parts;\n        }\n\n        function resizeUnityContainer() {\n            var container = document.getElementById(\"unityContainer\");\n            container.style.width = window.innerWidth + \"px\";\n            container.style.height = window.innerHeight + \"px\";\n        }\n        Promise.all([\n            mergeFiles(getParts(\"Build/Build.data.unityweb\", 1, 2))\n        ]).then(([dataUrl]) => {\n            window.dataUrll = dataUrl;\n            var json = {\n\"companyName\": \"Parsec Productions\",\n\"productName\": \"Slender\",\n\"dataUrl\": dataUrl,\n\"asmCodeUrl\": \"Build.asm.code.unityweb\",\n\"asmMemoryUrl\": \"Build.asm.memory.unityweb\",\n\"asmFrameworkUrl\": \"Build.asm.framework.unityweb\",\n\"TOTAL_MEMORY\": 268435456,\n\"graphicsAPI\": [\"WebGL 2.0\", \"WebGL 1.0\"],\n\"webglContextAttributes\": {\"preserveDrawingBuffer\": false},\n\"splashScreenStyle\": \"Dark\",\n\"backgroundColor\": \"#000000\"\n};\n            let blob = new Blob([JSON.stringify(json)], {\n                type: 'application/json'\n            });\n            let blobUrl = URL.createObjectURL(blob);\n            window.addEventListener('resize', resizeUnityContainer);\n            UnityLoader.instantiate(\"unityContainer\", json, {\n                onProgress: UnityProgress,\n                url: blobUrl,\n                Module: {\n                    onRuntimeInitialized: function () {\n                        resizeUnityContainer();\n                        document.querySelector(\"#loading-text\").remove();\n                    }\n                }\n            });\n        });\n    <\/script>\n</head>\n\n<body>\n    <div class=\"webgl-content\">\n      <div id=\"loading-text\" style=\"color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;\">LOADING...</div>\n        <div id=\"unityContainer\"></div>\n    </div>\n</body>\n\n</html>"},{"id":"1b251df4-ffd3-4e48-8a9a-cfe4a3988e9e","title":"Mortal Kombat","description":"Mortal Kombat 4 is a 1997 fighting game and the fourth main installment in the franchise. It is the series’ first title to use 3D polygon graphics instead of digitized actors, and the last to have an official arcade release. The story follows Raiden and Earthrealm's warriors fighting the fallen Elder God Shinnok.","image":"https://www.oldgamehermit.com/wp-content/uploads/2020/02/mortal_kombat_4_ps1.jpg","type":"html","content":"<!DOCTYPE html>\n\n\n<\!-- Ultimate Game Stash file--> \n<\!-- For the regularly updating doc go to https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/ -->\n\n\n\n <head> \n    <script>\n      window.gameconfig = {\n        name: \"Mortal Kombat 4\",\n        url: \"https://cdn.jsdelivr.net/gh/bubbls/ugss@main/mortalkombat4/Mortal%20Kombat%204%20(USA).zip\",\n        core: \"psx\",\n        min: 1,\n        max: 20,\n      };\n    <\/script>\n    <script>\n      function mergeFiles(fileParts, cb) {\n        return new Promise((resolve, reject) => {\n          let buffers = [];\n          function fetchPart(index) {\n            if (index >= fileParts.length) {\n              let mergedBlob = new Blob(buffers);\n              let mergedFileUrl = URL.createObjectURL(mergedBlob);\n              resolve(mergedFileUrl);\n              return;\n            }\n            fetch(fileParts[index])\n              .then((response) => response.arrayBuffer())\n              .then((data) => {\n                buffers.push(data);\n                fetchPart(index + 1);\n              })\n              .catch(reject);\n            cb(index);\n          }\n          fetchPart(0);\n        });\n      }\n      function getParts(file, start, end) {\n        let parts = [];\n        for (let i = start; i <= end; i++) {\n          let padded = String(i).padStart((end+\"\").length, '0');\n          parts.push(file + \".part\" + padded);\n        }\n        return parts;\n      }\ngetParts(\"asd.js\", 0, 100)\n    <\/script>\n    <style>\n      body,\n      html {\n        margin: 0;\n        padding: 0;\n        display: flex;\n        align-items: center;\n        justify-content: center;\n        width: 100%;\n        height: 100%;\n        background-color: #121212;\n        color: white;\n        font-family: Arial, sans-serif;\n      }\n      #game-container {\n        text-align: center;\n        width: 100%;\n        height: 100%;\n      }\n      #loading-progress {\n        font-size: 18px;\n        margin-top: 20px;\n        padding: 10px;\n        background: rgba(255, 255, 255, 0.1);\n        border-radius: 8px;\n        display: inline-block;\n      }\n    </style>\n  </head>\n  <body>\n    <div id=\"game-container\">\n      <div id=\"game\"></div>\n      <div id=\"loading-progress\">Loading: 0/0</div>\n      <div id=\"first-time\">First-time loading may take longer...</div>\n    </div>\n    <script>\n      var parts = getParts(\n        window.gameconfig.url,\n        window.gameconfig.min,\n        window.gameconfig.max\n      );\n      var totalParts = parts.length;\n\n      function updateLoadingProgress(loaded) {\n        const progressElement = document.getElementById(\"loading-progress\");\n        if (loaded === 0) {\n          progressElement.textContent = \"Loading: 0/0\";\n        } else {\n          progressElement.textContent = `Loading: ${loaded}/${totalParts}`;\n        }\n      }\n\n      Promise.all([mergeFiles(parts, updateLoadingProgress)])\n        .then(([gameUrl]) => {\n          document.getElementById(\"loading-progress\").remove();\n          document.getElementById(\"first-time\").remove();\n          EJS_player = \"#game\";\n          EJS_core = window.gameconfig.core;\n          EJS_gameName = window.gameconfig.name;\n          EJS_color = \"#0064ff\";\n          EJS_startOnLoaded = true;\n          EJS_pathtodata = \"https://cdn.jsdelivr.net/gh/genizy/emu@master/\";\n          EJS_gameUrl = gameUrl;\n          const script = document.createElement(\"script\");\n          script.src =\n            \"https://cdn.jsdelivr.net/gh/genizy/emu@master/loader.js\";\n          document.body.appendChild(script);\n        })\n        .catch((error) => {\n          console.error(error);\n          document.getElementById(\"loading-progress\").textContent =\n            \"Error loading game.\";\n        });\n    <\/script>\n  </body>\n</html>"},{"id":"44fef1de-5400-4323-9007-d9cbc780253d","title":"1V1.LOL","description":"1v1.lol is a fast-paced, competitive third-person shooter and building simulator. Players use a mix of combat and real-time construction (building walls, ramps, and platforms) to outmaneuver opponents and secure victories. It is widely played on web browsers, iOS, Android, and Steam","image":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQfPvAOmcRDnrxMnwDWcOeGzIXBlUqyr6_RYw&s","type":"html","content":"<\!-- Ultimate Game Stash file--> \n<\!-- For the regularly updating doc go to https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/ -->\n\n\n</style></head><body dir=\"ltr\"><script src=\"https://cdn.jsdelivr.net/gh/n-101-1/1@main/UnityProgress.js\"><\/script><script src=\"https://cdn.jsdelivr.net/gh/n-101-1/1@main/2.7.js\"><\/script><script type=\"text/javascript\">\n      var gameInstance;\n\n      window.onload = function () {\n        gameInstance = UnityLoader.instantiate(\"gameContainer\", \"https://cdn.jsdelivr.net/gh/n-101-1/1@main/2.7.json\", {\n          onProgress: UnityProgress,\n          Module: {\n            onRuntimeInitialized: function () {\n              UnityProgress(gameInstance, \"complete\");\n            },\n          },\n        });\n      };\n    <\/script>\n    <div class=\"webgl-content\">\n      <div id=\"gameContainer\" style=\"width: 100%; height: 100%; margin: 0px; padding: 0px; border: 0px; position: relative; background: rgb(0, 0, 0);\"><canvas id=\"#canvas\" style=\"width: 100%; height: 100%; cursor: default;\" width=\"1018\" height=\"926\"></canvas><div class=\"logo Dark\" style=\"display: none;\"></div><div class=\"progress Dark\" style=\"display: none;\"><div class=\"empty\" style=\"width: 0%;\"></div><div class=\"full\" style=\"width: 100%;\"></div></div></div>\n    </div>\n    <script src=\"https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase-app.js\"><\/script>\n\n    <\!-- Add Firebase products that you want to use -->\n    <script src=\"https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase-auth.js\"><\/script>\n    <script src=\"https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase-firestore.js\"><\/script>\n\n    <script src=\"https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase.js\"><\/script>\n    <script src=\"https://cdn.jsdelivr.net/gh/n-101-1/1@main/1login.js?v=2\"><\/script>\n    <script src=\"https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firestore.js\"><\/script>\n\n    <script>\n      initializeFireBase();\n\n      function showAds() {\n        console.log(\"show ads\");\n      }\n      function requestNewAd() {\n        // Show video ad\n        unityAdFinishedCallback();\n      }\n      function unityAdFinishedCallback() {\n        try {\n          if (gameInstance) gameInstance.SendMessage(\"AdsManager\", \"OnWebCallback\");\n        } catch (error) {\n          console.log(error);\n        }\n      }\n    <\/script>\n  \n\n\n\n\n\n\n<\/script><script src=\"blob:https://gotlgsogl-opensocial.googleusercontent.com/43fddd1c-53cc-4d6d-88c5-93762d972e03\" id=\"a96bf7f9ec45ce9224c9b5b9b42b17b2\"><\/script></body></html>"},{"id":"2864fea5-b401-4647-8219-109db2d8cfd1","title":"The Man From The Window","description":"The Man from the Window is the titular, terrifying antagonist of the popular indie horror game of the same name. He is a lanky, pale, humanoid entity driven by intense loneliness who kidnaps people to be his \"friends\".","image":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8mFfyeRxjinv0EDGPHhskxL30p8WOJFQegA&s","type":"html","content":"<\!-- Ultimate Game Stash file--> \n<\!-- For the regularly updating doc go to https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/ -->s\n\n<!DOCTYPE html>\n<html lang=\"en-us\">\n\n<head>\n    <base href=\"https://cdn.jsdelivr.net/gh/genizy/web-port@main/the-man-in-the-window/\">\n    <meta charset=\"utf-8\">\n    <meta http-equiv=\"Content-Type\" content=\"text/html; charset=utf-8\">\n    <title>Unity WebGL Player | TheManFromTheWindow</title>\n    <style>\n        html,\n        body {\n            margin: 0;\n            padding: 0;\n            height: 100%;\n            overflow: hidden;\n            background: #231F20;\n        }\n\n        #unity-canvas {\n            position: fixed;\n            inset: 0;\n            width: 100%;\n            height: 100%;\n            display: none;\n            background: #231F20;\n        }\n    </style>\n</head>\n\n<body>\n    <div id=\"loading-text\" style=\"color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;\"> LOADING... </div>\n    <canvas id=\"unity-canvas\"></canvas>\n    <script src=\"Build/build.loader.js\"><\/script>\n    <script>\n        let max = 0;\nlet done = 0;\nfunction mergeFiles(fileParts) {\n\treturn new Promise((resolve, reject) => {\n\t\tlet buffers = [];\n\n\t\tfunction fetchPart(index) {\n\t\t\tif (index >= fileParts.length) {\n\t\t\t\tlet mergedBlob = new Blob(buffers);\n\t\t\t\tlet mergedFileUrl = URL.createObjectURL(mergedBlob);\n\t\t\t\tresolve(mergedFileUrl);\n\t\t\t\treturn;\n\t\t\t}\n\t\t\tfetch(fileParts[index])\n\t\t\t\t.then((response) => response.arrayBuffer())\n\t\t\t\t.then((data) => {\n\t\t\t\t\tbuffers.push(data);\n\t\t\t\t\tdone = done+1;\n\t\t\t\t\tdocument.querySelector(\"#loading-text\").textContent = `LOADING... (${done}/${max})`;\n\t\t\t\t\tfetchPart(index + 1);\n\t\t\t\t})\n\t\t\t\t.catch(reject);\n\t\t}\n\t\tfetchPart(0);\n\t});\n}\n\nfunction getParts(file, start, end) {\n\tlet parts = [];\n\tfor (let i = start; i <= end; i++) {\n\t\tparts.push(file + \".part\" + i);\n\t}\n\tmax = max+end;\n\treturn parts;\n}\n\n        function resizeUnityContainer() {\n            var container = document.getElementById(\"unityContainer\");\n            container.style.width = window.innerWidth + \"px\";\n            container.style.height = window.innerHeight + \"px\";\n        }\n        Promise.all([\n            mergeFiles(getParts(\"Build/build.data\", 1, 3)),\n            mergeFiles(getParts(\"Build/build.wasm\", 1, 2)),\n        ]).then(([dataUrl, wasmurl]) => {\n            const canvas = document.querySelector(\"#unity-canvas\");\n            const loadingtext = document.querySelector(\"#loading-text\");\n            createUnityInstance(canvas, {\n                dataUrl: dataUrl,\n                frameworkUrl: \"Build/build.framework.js\",\n                codeUrl: wasmurl,\n                streamingAssetsUrl: \"StreamingAssets\",\n                companyName: \"Zed_Technician\",\n                productName: \"TheManFromTheWindow\",\n                productVersion: \"0.9921\",\n                matchWebGLToCanvasSize: true\n            }, progess => {\n                if (progess >= 1.0) {\n                    loadingtext.remove();\n                    canvas.style.display = 'block';\n                }\n            });\n\n            function resizeCanvas() {\n                canvas.height = window.innerHeight;\n                canvas.width = window.innerWidth;\n                setTimeout(resizeCanvas, 1000);\n            }\n            resizeCanvas();\n        });\n    <\/ "></div>\n        <div id=\"unity-progress-bar-empty\">\n          <div id=\"unity-progress-bar-full\"></div>\n        </div>\n      </div>\n    </div>\n    <script>\n      const loadingText = document.querySelector(\"#loading-text\");\n      let totalBytes = 315673804.8;\n      let loadedBytes = 0;\n\n      function formatSize(bytes) {\n        if (bytes > 1024 * 1024 * 1024) {\n          return (bytes / (1024 * 1024 * 1024)).toFixed(2) + \" GB\";\n        } else if (bytes > 1024 * 1024) {\n          return (bytes / (1024 * 1024)).toFixed(2) + \" MB\";\n        } else if (bytes > 1024) {\n          return (bytes / 1024).toFixed(2) + \" KB\";\n        } else {\n          return bytes + \" B\";\n        }\n      }\n      async function fetchWithProgress(url) {\n        const response = await fetch(url);\n        const reader = response.body.getReader();\n        let chunks = [];\n        let received = 0;\n        while (true) {\n          const { done, value } = await reader.read();\n          if (done) break;\n          received += value.length;\n          loadedBytes += value.length;\n          chunks.push(value);\n          const doneText = formatSize(loadedBytes);\n          const totalText = formatSize(totalBytes);\n          const percent =\n            totalBytes > 0\n              ? ((loadedBytes / totalBytes) * 100).toFixed(1)\n              : \"?\";\n          loadingText.textContent = `LOADING... ${doneText} / ${totalText} (${percent}%)`;\n        }\n        let fullBuffer = new Uint8Array(received);\n        let offset = 0;\n        for (let chunk of chunks) {\n          fullBuffer.set(chunk, offset);\n          offset += chunk.length;\n        }\n        return fullBuffer.buffer;\n      }\n      async function mergeFiles(parts) {\n        const buffers = await Promise.all(parts.map(fetchWithProgress));\n        return URL.createObjectURL(new Blob(buffers));\n      }\n\n      function getParts(file, count) {\n        let parts = [];\n        for (let i = ead>\n<body>\n  <div id=\"unity-container\">\n    <canvas id=\"unity-canvas\" tabindex=\"-1\"></canvas>\n\n    <div id=\"unity-loading-bar\">\n      <div id=\"unity-progress-bar-full\"></div>\n    </div>\n  </div>\n\n  <script>\n    const canvas = document.querySelector(\"#unity-canvas\");\n    const loadingBar = document.querySelector(\"#unity-loading-bar\");\n    const progressBarFull = document.querySelector(\"#unity-progress-bar-full\");\n\n    function unityShowBanner(msg, type) {\n      // no need for errors\n    }\n\n    const buildUrl = \"Build\";\n    const loaderUrl = buildUrl + \"/Build.loader.js\";\n\n    async function loadSplitData(baseUrl, parts) {\n      const chunks = [];\n      for (let i = 1; i <= parts; i++) {\n        const partUrl = `${baseUrl}.part${i}`;\n        const response = await fetch(partUrl);\n        if (!response.ok) throw new Error(`Failed to load ${partUrl}`);\n        const chunk = await response.arrayBuffer();\n        chunks.push(chunk);\n        progressBarFull.style.width = (i / parts) * 30 + \"%\";\n      }\n      const mergedBlob = new Blob(chunks);\n      return URL.createObjectURL(mergedBlob);\n    }\n\n    const config = {\n      dataUrl: buildUrl + \"/Build.data\",\n      frameworkUrl: buildUrl + \"/Build.framework.js\",\n      codeUrl: buildUrl + \"/Build.wasm\",\n      streamingAssetsUrl: \"StreamingAssets\",\n      companyName: \"twoootwo\",\n      productName: \"Bad Parenting 1\",\n      productVersion: \"1.0\",\n      showBanner: unityShowBanner,\n    };\n\n    // Make the canvas dynamically fit the screen\n    function resizeCanvas() {\n      canvas.width = window.innerWidth;\n      canvas.height = window.innerHeight;\n    }\n    window.addEventListener(\"resize\", resizeCanvas);\n    resizeCanvas();\n\n    loadingBar.style.display = \"block\";\n\n    Promise.all([\n      loadSplitData(\"Build/Build.wasm\", 2),\n      loadSplitData(\"Build/Build.data\", 3)\n    ])\n    .then(([wasmUrl, dataUrl]) => {\n      config.codeUrl = wasmUrl;\n      config.dataUrl = dataUrl;\n\n      const script = document.createElement(\"script\");\n      script.src = loaderUrl;\n      script.onload = () => {\n        createUnityInstance(canvas, config, (progress) => {\n          progressBarFull.style.width = 30 + (70 * progress) + \"%\";\n        }).then((unityInstance) => {\n          loadingBar.style.display = \"none\";\n          window.addEventListener(\"click\", () => {\n            unityInstance.SetFullscreen(1);\n          });\n          URL.revokeObjectURL(wasmUrl);\n          URL.revokeObjectURL(dataUrl);\n        }).catch((message) => {\n          alert(message);\n        });\n      };\n      document.body.appendChild(script);\n    })\n    .catch((error) => {\n      alert(\"Failed to load game data: \" + error.message);\n    });\n  <\/script>\n</body>\n</html>"},{"id":"1c5b9a1e-0074-4b81-ab8c-56e127be75f7","title":"Fifa 11","description":"FIFA 11 (also known as FIFA Soccer 11) is a highly acclaimed football simulation game developed by EA Canada. It revolutionized the franchise by introducing the \"Personality+\" system, which authenticates player skills and traits, alongside the \"Pro Passing\" mechanic and the ability to control the goalkeeper.","image":"https://upload.wikimedia.org/wikipedia/en/f/f5/Fifa11_Game_Cover.jpg","type":"html","content":"<script async src=\"https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT\"><\/script>\n<script>\n  window.dataLayer = window.dataLayer || [];\n  function gtag(){dataLayer.push(arguments);}\n  gtag('js', new Date());\n\n  gtag('config', 'G-L7856P3VNT');\n<\/script><!DOCTYPE html>\n\n\n<\!-- Ultimate Game Stash file--> \n<\!-- For the regularly updating doc go to https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/ -->\n\n\n  <head> \n    <script>\n      window.gameconfig = {\n        name: \"FIFA Soccer 11 (USA)\",\n        url: \"https://cdn.jsdelivr.net/gh/bubbls/ugss@acf87526e35a0c37ab4dd73c987b7a01713fa88b/FI      script.onload = () => {\n                StartUnityInstance = function () {\n                    createUnityInstance(canvas, config, (progress) => {\n                        spinner.style.display = \"none\";\n                        progressBarEmpty.style.display = \"\";\n                        progressBarFull.style.width = `${100 * progress}%`;\n                    }).then((unityInstance) => {\n                        myGameInstance = unityInstance;\n                        loadingCover.style.display = \"none\";\n                    }).catch((message) => {\n                        console.error(\"Unity yükleme hatası:\", message);\n                    });\n                };\n                StartUnityInstance();\n            };\n            document.body.appendChild(script);\n        } catch (error) {\n            console.error(\"Başlatma sırasında hata:\", error);\n        }\n\n        function InitGame() {\n            try {\n                console.log('Init Game Success');\n                initGame = true;\n                if (nowFullAdOpen === true && myGameInstance != null) {\n                    myGameInstance.SendMessage('YandexGame', 'OpenFullAd');\n                }\n            } catch (error) {\n                console.error(\"InitGame sırasında hata:\", error);\n            }\n        }\n\n        // Hata oluştuğunda oyuna devam etmek için tüm hataları global olarak yakalayan yapı\n        window.addEventListener(\"unhandledrejection\", function(event) {\n            console.warn(\"Hata es geçildi:\", event.reason);\n            event.preventDefault();\n        });\n<\/script>\n//---AST\n\n</body>\n</html>\n\n]]></Content>\n</Module>"},{"id":"f2d0e84e-5eac-4df2-89ef-34d033ba8aed","title":"Street Fighter","description":"Street Fighter is a legendary, competitive 2D fighting game franchise developed by Capcom. Players choose from an international roster of unique martial artists—each with their own fighting styles and special moves—to battle in one-on-one matches, testing reflex, timing, and strategy.","image":"https://upload.wikimedia.org/wikipedia/en/0/0d/Street_Fighter_Collection.jpeg","type":"html","content":"<html>\n\n\n<\!-- Ultimate Game Stash file--> \n<\!-- For the regularly updating doc go to https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/ -->\n\n\n\n<head>\n\t<script src=\"//www.google.com/jsapi\"><\/script>\n\t<script>\n\t\twindow.parent.maeExportApis_();\n\t<\/script>\n\n\t<style>\n\t\tbody {\n\t\t\toverflow: hidden;\n\t\t\tbackground: #000000;\n\t\t\tmargin-top: 0;\n\t\t\tmargin-left: 0;\n\t\t\tcolor: #000000;\n\t\t}\n\n\t\t#startButton {\n\t\t\tdisplay: block;\n\t\t\twidth: 160px;\n\t\t\theight: 40px;\n\t\t\tbackground-color: #4CAF50;\n\t\t\tcolor: white;\n\t\t\ttext-align: center;\n\t\t\ttext-decoration: none;\n\t\t\tfont-size: 16px;\n\t\t\tmargin: 20px auto;\n\t\t\tpadding: 10px 20px;\n\t\t\tborder: none;\n\t\t\tborder-radius: 8px;\n\t\t\tcursor: pointer;\n\t\t\tfont-family: 'Press Start 2P', cursive;\n\t\t\tbox-shadow: 0px 0px 10px 2px #000000;\n\t\t}\n\t</style>\n\t<link href=\"https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap\" rel=\"stylesheet\">\n\t<style type=\"text/css\">\n\t\t#button {\n\t\t\tdisplay: none;\n\t\t}\n\n\t\t.imgb_vis {\n\t\t\tanimation: imgb-animation 7s linear;\n\t\t}\n\n\t\t@keyframes imgb-animation {\n\t\t\t10% {\n\t\t\t\ttransform: translateX(0);\n\t\t\t}\n\n\t\t\t20% {\n\t\t\t\ttransform: translateX(100px);\n\t\t\t}\n\n\t\t\t90% {\n\t\t\t\ttransform: translateX(100px);\n\t\t\t}\n\n\t\t\t100% {\n\t\t\t\ttransform: translateX(0);\n\t\t\t}\n\t\t}\n\t</style>\n</head>\n\n<body>\n\t<div style=\"width: 100vw; height: 100vh;max-width:100%\">\n\t\t<div id=\"game\" style=\"display: none;\"></div>\n\t\t<button id=\"startButton\">PLAY</button>\n\t</div>\n\t<script>\n\t\tdocument.getElementById(\"game\").style.display = \"none\";\n            function startGame() {\n                document.getElementById(\"game\").style. ,\n        core: \"psx\",\n        min: 1,\n        max: 19,\n      };\n    <\/script>\n    <script>\n      function mergeFiles(fileParts, cb) {\n        return new Promise((resolve, reject) => {\n          let buffers = [];\n          function fetchPart(index) {\n            if (index >= fileParts.length) {\n              let mergedBlob = new Blob(buffers);\n              let mergedFileUrl = URL.createObjectURL(mergedBlob);\n              resolve(mergedFileUrl);\n              return;\n            }\n            fetch(fileParts[index])\n              .then((response) => response.arrayBuffer())\n              .then((data) => {\n                buffers.push(data);\n                fetchPart(index + 1);\n              })\n              .catch(reject);\n            cb(index);\n          }\n          fetchPart(0);\n        });\n      }\n      function getParts(file, start, end) {\n        let parts = [];\n        for (let i = start; i <= end; i++) {\n          let padded = String(i).padStart((end+\"\").length, '0');\n          parts.push(file + \".part\" + padded);\n        }\n        return parts;\n      }\n\n    <\/script>\n    <style>\n      body,\n      html {\n        margin: 0;\n        padding: 0;\n        display: flex;\n        align-items: center;\n        justify-content: center;\n        width: 100%;\n        height: 100%;\n        background-color: #121212;\n        color: white;\n        font-family: Arial, sans-serif;\n      }\n      #game-container {\n        text-align: center;\n        width: 100%;\n        height: 100%;\n      }\n      #loading-progress {\n        font-size: 18px;\n        margin-top: 20px;\n        padding: 10px;\n        background: rgba(255, 255, 255, 0.1);\n        border-radius: 8px;\n        display: inline-block;\n      }\n    </style>\n  </head>\n  <body>\n    <div id=\"game-container\">\n      <div id=\"game\"></div>\n      <div id=\"loading-progress\">Loading: 0/0</div>\n      <div id=\"first-time\">First-time loading may take longer...</div>\n    </div>\n    <script>\n      var parts = getParts(\n        window.gameconfig.url,\n        window.gameconfig.min,\n        window.gameconfig.max\n      );\n      var totalParts = parts.length;\n\n      function updateLoadingProgress(loaded) {\n        const progressElement = document.getElementById(\"loading-progress\");\n        if (loaded === 0) {\n          progressElement.textContent = \"Loading: 0/0\";\n        } else {\n          progressElement.textContent = `Loading: ${loaded}/${totalParts}`;\n        }\n      }\n\n      Promise.all([mergeFiles(parts, updateLoadingProgress)])\n        .then(([gameUrl]) => {\n          document.getElementById(\"loading-progress\").remove();\n          document.getElementById(\"first-time\").remove();\n          EJS_player = \"#game\";\n          EJS_core = window.gameconfig.core;\n          EJS_gameName = window.gameconfig.name;\n          EJS_color = \"#0064ff\";\n          EJS_startOnLoaded = true;\n          EJS_pathtodata = \"https://cdn.jsdelivr.net/gh/genizy/emu@master/\";\n          EJS_gameUrl = gameUrl;\n          const script = document.createElement(\"script\");\n          script.src =\n            \"https://cdn.jsdelivr.net/gh/genizy/emu@master/loader.js\";\n          document.body.appendChild(script);\n        })\n        .catch((error) => {\n          console.error(error);\n          document.getElementById(\"loading-progress\").textContent =\n            \"Error loading game.\";\n        });\n    <\/script>\n  </body>\n</html>"},{"id":"b7afdad7-88e8-4554-91ae-097069ff0119","title":"Get Yoked","description":"ET YOKED: Extreme Bodybuilding is a humorous roguelike deck-building game where you transform a scrawny weakling into a massive, muscle-bound behemoth. Often compared to games like Slay the Spire and Balatro, it blends intense weightlifting strategy with card mechanics to achieve extreme gains.","image":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTGvSExm0S392Iwg05oxoZgVc0VZgFgJeeJSg&s","type":"html","content":"<!DOCTYPE html>\n\n\n<\!-- Ultimate Game Stash file--> \n<\!-- For the regularly updating doc go to https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/ -->\n\n\n\n<html lang=\"en-us\">\n<base href=\"https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/get%20yoked/\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta http-equiv=\"Content-Type\" content=\"text/html; charset=utf-8\">\n  <title>game :D</title>\n  <style>\n    html, body {\n      background: #000;\n      width: 100%;\n      height: 100%;\n      overflow: visible;\n      padding: 0;\n      margin: 0;\n    }\n\n    #gameContainer {\n      background: transparent !important;\n      position: absolute;\n    }\n\n    #gameContainer canvas {\n      position: absolute;\n    }\n\n    #gameContainer canvas[data-pixel-art=\"true\"] {\n      image-rendering: optimizeSpeed;\n      image-rendering: -webkit-crisp-edges;\n      image-rendering: -moz-crisp-edges;\n      image-rendering: -o-crisp-edges;\n      image-rendering: crisp-edges;\n      image-rendering: pixelated;\n      -ms-interpolation-mode: nearest-neighbor;\n    }\n\n    #loading-text {\n      color: white;\n      font-family: sans-serif;\n      text-align: center;\n      margin-top: 1em;\n    }\n  </style>\n</head>\n\n<body>\n  <div id=\"gameContainer\">\n    <canvas id=\"unity-canvas\" data-pixel-art></canvas>\n    <div id=\"loading-text\">LOADING...</div>\n  </div>\n\n  <script src=\"Build/Web.loader.js\"><\/script>\n  <script>\n    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {\n      const meta = document.createElement('meta');\n      meta.name = 'viewport';\n      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';\n      document.head.appendChild(meta);\n    }\n\n    const loadingText = document.querySelector(\"#loading-text\");\n    let totalBytes = 0;\n    let loadedBytes = 0;\n\n    function formatSize(bytes) {\n      if (bytes > 1024 * 1024 * 1024) return (bytes / (1024 * 1024 * 1024)).toFixed(2) + \" GB\";\n      if (bytes > 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + \" MB\";\n      if (bytes > 1024) return (bytes / 1024).toFixed(2) + \" KB\";\n      return bytes + \" B\";\n    }\n\n    async function getSize(url) {\n      try {\n        const res = await fetch(url, { method: \"HEAD\" });\n        return parseInt(res.headers.get(\"Content-Length\") || \"0\", 10);\n      } catch {\n        return 0;\n      }\n    }\n\n    async function fetchPart(url) {\n      const response = await fetch(url);\n      if (!response.body) {\n        const ab = await response.arrayBuffer();\n        loadedBytes += ab.byteLength;\n        loadingText.textContent = `LOADING... ${formatSize(loadedBytes)} / ${formatSize(totalBytes)}`;\n        return new Uint8Array(ab);\n      }\n      const reader = response.body.getReader();\n      const chunks = [];\n      let received = 0;\n      while (true) {\n        const { done, value } = await reader.read();\n        if (done) break;\n        received += value.length;\n        loadedBytes += value.length;\n        chunks.push(value);\n        const percent = totalBytes > 0 ? ((loadedBytes / totalBytes) * 100).toFixed(1) : \"?\";\n        loadingText.textContent = `LOADING... ${formatSize(loadedBytes)} / ${formatSize(totalBytes)} (${percent}%)`;\n      }\n      const full = new Uint8Array(received);\n      let offset = 0;\n      for (let chunk of chunks) {\n        full.set(chunk, offset);\n        offset += chunk.length;\n      }\n      return full;\n    }\n\n    async function mergeParts(parts, mimeType) {\n      const buffers = await Promise.all(parts.map(fetchPart));\n      const totalLen = buffers.reduce((s, b) => s + b.length, 0);\n      const concatenated = new Uint8Array(totalLen);\n      let off = 0;\n      for (let b of buffers) {\n        concatenated.set(b, off);\n        off += b.length;\n      }\n      return URL.createObjectURL(new Blob([concatenated], { type: mimeType || undefined }));\n    }\n\n    function getParts(file, count) {\n      const parts = [];\n      for (let i = 1; i <= count; i++) parts.push(file + \".part\" + i);\n      return parts;\n    }\n\n    (async () => {\n      try {\n        const dataParts = getParts(\"Build/Web.data\", 2);\n        const wasmParts = getParts(\"Build/Web.wasm\", 3);\n        const allParts = [...dataParts, ...wasmParts, \"Build/Web.framework.js\"];\n        const sizes = await Promise.all(allParts.map(getSize));\n        totalBytes = sizes.reduce((a, b) => a + b, 0);\n\n        const [dataUrl, wasmUrl, frameworkUrl] = await Promise.all([\n          mergeParts(dataParts),\n          mergeParts(wasmParts),\n          mergeParts([\"Build/Web.framework.js\"], 'application/javascript')\n        ]);\n\n        const canvas = document.querySelector(\"#unity-canvas\");\n        let scaleToFit = true;\n\n        function onResize() {\n          const container = canvas.parentElement;\n          let w, h;\n          if (scaleToFit) {\n            w = window.innerWidth;\n            h = window.innerHeight;\n            const r = 540 / 960;\n            if (w * r > window.innerHeight) w = Math.min(w, Math.ceil(h / r));\n            h = Math.floor(w * r);\n          } else {\n            w = 960;\n            h = 540;\n          }\n          container.style.width = canvas.style.width = w + \"px\";\n          container.style.height = canvas.style.height = h + \"px\";\n          container.style.top = Math.floor((window.innerHeight - h) / 2) + \"px\";\n          container.style.left = Math.floor((window.innerWidth - w) / 2) + \"px\";\n        }\n        window.addEventListener('resize', onResize);\n        onResize();\n\n        // Wait until Unity loader is available\n        await (async function waitForLoader() {\n          if (typeof createUnityInstance === 'function') return;\n          await new Promise(resolve => {\n            const check = setInterval(() => {\n              if (typeof createUnityInstance === 'function') {\n                clearInterval(check);\n                resolve();\n              }\n            }, 50);\n          });\n        })();\n\n        const config = {\n          dataUrl: dataUrl,\n          frameworkUrl: frameworkUrl,\n          codeUrl: wasmUrl,\n          streamingAssetsUrl: \"https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/get%20yoked/StreamingAssets\",\n          companyName: \"\",\n          productName: \"\",\n          productVersion: \"\"\n        };\n\n        createUnityInstance(canvas, config, (progress) => {\n          const percent = Math.round(progress * 100);\n          loadingText.textContent = `LOADING... ${percent}%`;\n        }).then((unityInstance) => {\n          loadingText.remove();\n        }).catch((message) => {\n          loadingText.textContent = 'Failed to start Unity: ' + message;\n          console.error(message);\n        });\n      } catch (err) {\n        loadingText.textContent = 'ERROR: ' + (err.message || err);\n        console.error(err);\n      }\n    })();\n  <\/script>\n</body>"},{"id":"6956bfdc-dd92-4fcd-8eeb-feb049e3bcc6","title":"Granny 3","description":"Granny 3 is a popular first-person survival horror puzzle game where you play as an explorer trapped in a fortified mansion. Your objective is to find items and solve puzzles to escape within five days, all while avoiding Granny, Grandpa, and Slendrina.","image":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT3vhBt8IZA9BQPsdPU_uBaimN5fmgg8YmVpQ&s","type":"html","content":"<!DOCTYPE html>\n\n\n<\!-- Ultimate Game Stash file--> \n<\!-- For the regularly updating doc go to https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/ -->\n\n\n<html lang=\"en-us\">\n\n<head>\n<base href=\"https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@e33a208915bda83b7ba4356e5bb805b7f956336b/granny%203/\">\n\n  <script>\n      // ts true 💔😭✌\n      window.gnMathIsTheBestGameSit    YaGames.init({\n        adv: {\n          onAdvClose: wasShown => {\n            console.info('adv closed!');\n          }\n        }\n      })\n        .then(ysdk => {\n          sdk = ysdk;\n          ysdk.getPlayer({ signed: true }).then(_player => {\n            player = _player;\n          }).catch(err => {\n          });\n          ysdk.getPayments({ signed: true }).then(_payments => {\n            payments = _payments;\n            console.log(\"Purchasing True\");\n            payments.getPurchases().then(purchases => {\n            if (purchases.some(purchase => purchase.productID === 'remove_ads')) {\n                SHOW_ADS = false;\n              }\n          }).catch(err => {\n          })\n          }).catch(err => {\n          })\n          if(SHOW_ADS){\n            sdk.adv.showFullscreenAdv({ callbacks: {} });\n            sdk.adv.showBannerAdv();\n          }\n          else\n          {\n            sdk.adv.hideBannerAdv();\n          }\n        });\n    } else {\n      console.warn('YaGames SDK not available');\n    }\n\n    function checkCom() {\n      var isCom = 0;\n      var output;\n\n      if (sdk != null) {\n        var output = sdk.environment.i18n.tld;\n        if (output == \"com\") {\n          isCom = 1;\n        } else if (output == \"com.tr\") {\n          isCom = 2;\n        }\n      }\n\n      console.log(output);\n      console.log(isCom);\n\n      if (window.unityInstance) {\n        window.unityInstance.SendMessage('GameManager', 'IsCom', isCom);\n      }\n\n      if (payments != null) {\n        initPurchasing();\n        checkShop();\n      }\n    }\n\n    function purchaseComplete(id) \n    {\n        if(id == 0)\n        {\n            SHOW_ADS = false;\n            if (sdk) sdk.adv.hideBannerAdv();\n        }\n    }\n\n    function checkShop() \n    {\n        if (payments) {\n          payments.getPurchases().then(purchases => {\n            if (purchases.some(purchase => purchase.productID === 'remove_ads')) {\n                SHOW_ADS = false;\n                window.unityInstance.SendMessage('SDKPlatforms', 'ShopComplete', 0);\n                sdk.adv.hideBannerAdv();\n            }\n            if (purchases.some(purchase => purchase.productID === 'weapon_1')) {\n                window.unityInstance.SendMessage('SDKPlatforms', 'ShopComplete', 3);\n            }\n            if (purchases.some(purchase => purchase.productID === 'weapon_2')) {\n                window.unityInstance.SendMessage('SDKPlatforms', 'ShopComplete', 4);\n            }\n          }).catch(err => {\n          })\n        }\n    }\n\n    function initPurchasing() {\n      console.log('Get Purchasing Data....');\n      if (payments != null) {\n        var gameShop = []\n        payments.getCatalog().then(products => {\n          gameShop = products;\n          console.log('Get Catalog Data....');\n          gameShop.forEach(product => {\n            window.unityInstance.SendMessage('SDKPlatforms', 'PurchaseDataId', product.id);\n            window.unityInstance.SendMessage('SDKPlatforms', 'PurchaseDataPrice', product.priceValue);\n            console.log(product.id + ' ' + product.price);\n          });\n        });\n        payments.getPurchases().then(purchases => purchases.forEach(consumePurchase));\n      }\n    }\n\n    function consumePurchase(purchase) {\n      window.unityInstance.SendMessage('SDKPlatforms', 'PurchasesComplete', purchase.id);\n      payments.consumePurchase(purchase.purchaseToken)\n    }\n\n    function buy(id_buy) {\n      if (payments != null) {\n        payments.purchase({ id: id_buy }).then(purchase => {\n          window.unityInstance.SendMessage('SDKPlatforms', 'PurchasesComplete', id_buy);\n          if (id_buy != 'remove_ads') \n          {\n            payments.consumePurchase(purchase.purchaseToken);\n          }\n        });\n      }\n    }\n\n    function checkSave() {\n        loadData();\n    }\n\n    function checkLanguage() {\n      var currentLanguage = 0;\n      var output;\n\n      if (sdk != null) {\n        var output = sdk.environment.i18n.lang;\n        if (output == \"ru\" || output == \"be\" || output == \"kk\" || output == \"uk\" || output == \"uz\")\n          currentLanguage = 0;\n        else if (output == \"tr\")\n          currentLanguage = 2;\n        else\n          currentLanguage = 1;\n      }\n\n      console.log(output);\n      console.log(currentLanguage);\n\n      if (window.unityInstance) {\n        window.unityInstance.SendMessage('GameManager', 'SetLanguage', currentLanguage);\n      }\n    }\n\n    function loadData() {\n      if (player != null) {\n        console.log(\"Loading......\")\n        var save1;\n        var save2;\n        player.getData([\"save1\", \"save2\"]).then(data => {\n          if(data.save1) {\n            console.log(\"Load\")\n            window.unityInstance.SendMessage('SDKPlatforms', 'LoadCloudFirst', data.save1);\n            window.unityInstance.SendMessage('SDKPlatforms', 'LoadCloud', data.save2);\n          }\n          else {\n            console.log('No Save');\n          }\n        }).catch(() => {\n          console.log('No Save');\n        });\n      }\n    }\n\n    function saveCloud(dataSave, dataSave2, counterSave) {\n      console.log(\"Saving....... \");\n      if (player != null) {\n        player.getData([\"save1\", \"counterFunny2\", \"save2\"]).then(data => {\n          if (data.counterFunny2) {\n            console.log('Counter ' + data.counterFunny2 + \" \" + counterSave);\n            if (data.counterFunny2 < counterSave) {\n              player.setData({\n                save1: dataSave,\n                save2: dataSave2,\n                counterFunny2: counterSave,\n              }).then(() => {\n                console.log('data is set -update');\n              });\n            }\n          }\n          else {\n            player.setData({\n              save1: dataSave,\n              save2: dataSave2,\n              counterFunny2: counterSave,\n            }).then(() => {\n              console.log('data is set -first');\n            });\n          }\n        }).catch(() => {\n          player.setData({\n             save1: dataSave,\n             save2: dataSave2,\n             counterFunny2: counterSave,\n          }).then(() => {\n            console.log('data is set -first');\n          });\n        });\n      }\n    }\n\n    function showFullscrenAd() {\n      if (sdk && sdk.adv) {\n        sdk.adv.showFullscreenAdv({\n          callbacks: {}\n        })\n      }\n    }\n\n    function rate() {\n    }\n\n    function showRewardedAd(id) {\n      if (sdk && sdk.adv) {\n        sdk.adv.showRewardedVideo({\n          callbacks: {\n            onOpen: () => {\n              window.unityInstance.SendMessage('SDKPlatforms', 'AudioEnable', 0);\n            },\n            onRewarded: () => {\n              window.unityInstance.SendMessage('SDKPlatforms', 'AudioEnable', 1);\n              window.unityInstance.SendMessage('SDKPlatforms', 'BuyComplete', id);\n            },\n            onClose: () => {\n              window.unityInstance.SendMessage('SDKPlatforms', 'AudioEnable', 1);\n            },\n            onError: (e) => {\n              window.unityInstance.SendMessage('SDKPlatforms', 'AudioEnable', 1);\n            }\n          }\n        })\n      }\n    }\n  <\/script>\n  </body>\n</html>"},{"id":"ba9b0085-de7d-447a-86e2-055a69f09ffb","title":"UltraKill","description":"ULTRAKILL is a fast-paced, ultraviolent retro FPS combining the bloody, arcade-style carnage of '90s shooters with the creative, combo-heavy mechanics of spectacle fighters like Devil May Cry","image":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQbKcxwXKOEsoKnr_XLjnQo0KROxF5k3Twc5A&s","type":"html","content":"<!DOCTYPE html>\n<html lang=\"en-us\">\n\n<head>\n    <base href=\"https://cdn.jsdelivr.net/gh/genizy/web-port@master/ultrakill/\">\n    <meta charset=\"utf-8\">\n    <meta http-equiv=\"Content-Type\" content=\"text/html; charset=utf-8\">\n    <title>Unity WebGL Player | ULTRAKILL</title>\n    <style>\n        html,\n        body {\n            margin: 0;\n            padding: 0;\n            overflow: hidden;\n            height: 100%;\n            width: 100%;\n        }\n\n        #unity-container {\n            width: 100%;\n            height: 100%;\n            position: fixed;\n            top: 0;\n            left: 0;\n        }\n    </style>\n</head>\n\n<body style=\"text-align: center; padding: 0; border: 0; margin: 0;\">\n    <div id='loading-text' style=\"color: black; font-family: cursive; font-size: 48px; text-align: center; margin-top: 20px;\">LOADING...</div>\n    <canvas id=\"unity-canvas\" tabindex=\"-1\" hidden></canvas>\n    <script src=\"Build/ultrakill.loader.js\"><\/script>\n    <script>\n        var canvas = document.querySelector(\"#unity-canvas\");\n        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {\n            // Mobile device style: fill the whole browser client area with the game canvas:\n            var meta = document.createElement('meta');\n            meta.name = 'viewport';\n            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';\n            document.getElementsByTagName('head')[0].appendChild(meta);\n            canvas.style.width = \"100%\";\n            canvas.style.height = \"100%\";\n            canvas.style.position = \"fixed\";\n            document.body.style.textAlign = \"left\";\n        } else {\n            function resizeCanvas() {\n                canvas.width = window.innerWidth;\n                canvas.height = window.innerHeight;\n                canvas.style.width = window.innerWidth + \"px\";\n                canvas.style.height = window.innerHeight + \"px\";\n            }\n            resizeCanvas();\n            window.addEventListener('resize', resizeCanvas);\n        }\n\n        function mergeFiles(fileParts) {\n            return new Promise((resolve, reject) => {\n                let buffers = [];\n\n                function fetchPart(index) {\n                    if (index >= fileParts.length) {\n                        let mergedBlob = new Blob(buffers);\n                        let mergedFileUrl = URL.createObjectURL(mergedBlob);\n                        resolve(mergedFileUrl);\n                        return;\n                    }\n                    fetch(fileParts[index]).then((response) => response.arrayBuffer()).then((data) => {\n                        buffers.push(data);\n                        fetchPart(index + 1);\n                    }).catch(reject);\n                }\n                fetchPart(0);\n            });\n        }\n\n        function getParts(file, start, end) {\n            let parts = [];\n            for (let i = start; i <= end; i++) {\n                parts.push(file + \".part\" + i);\n            }\n            return parts;\n        }\n        Promise.all([\n            mergeFiles(getParts(\"Build/ultrakill.data.unityweb\", 1, 4)),\n            mergeFiles(getParts(\"Build/ultrakill.wasm.unityweb\", 1, 2))\n        ]).then(([dataUrl, wasmurl]) => {\n            document.querySelector(\"#unity-canvas\").hidden = false;\n            createUnityInstance(document.querySelector(\"#unity-canvas\"), {\n                dataUrl: dataUrl,\n                frameworkUrl: \"Build/ultrakill.framework.js.unityweb\",\n                codeUrl: wasmurl,\n                streamingAssetsUrl: \"StreamingAssets\",\n                companyName: \"Hakita and Cake Logic\",\n                productName: \"ULTRAKILL\",\n                productVersion: \"1.4\",\n                // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.\n                // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.\n            }).then((e) => {\n                document.querySelector(\"#loading-text\").remove();\n            });\n        });\n    <\/script>\n</body>\n\n</html> <\!-- Add this button where you want it to appear in your HTML -->\n<button onclick=\"toggleFullScreen()\">Go Full Screen</button>\n\n<\!-- Add this script to your HTML file, preferably just before the closing </body> tag -->\n<script>\n  function toggleFullScreen() {\n    var elem = document.documentElement; // Targets the entire page/document\n\n    if (!document.fullscreenElement &&    // alternative standard method\n        !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement ) {\n      if (elem.requestFullscreen) {\n        elem.requestFullscreen();\n      } else if (elem.mozRequestFullScreen) { /* Firefox */\n        elem.mozRequestFullScreen();\n      } else if (elem.webkitRequestFullscreen) { /* Chrome, Safari and Opera */\n        elem.webkitRequestFullscreen();\n      } else if (elem.msRequestFullscreen) { /* IE/Edge */\n        elem.msRequestFullscreen();\n      }\n    } else {\n      if (document.exitFullscreen) {\n        document.exitFullscreen();\n      } else if (document.mozCancelFullScreen) { /* Firefox */\n        document.mozCancelFullScreen();\n      } else if (document.webkitExitFullscreen) { /* Chrome, Safari and Opera */\n        document.webkitExitFullscreen();\n      } else if (document.msExitFullscreen) { /* IE/Edge */\n        document.msExitFullscreen();\n      }\n    }\n  }\n<\/script>"},{"id":"5f9ef1c6-6e58-43af-aa29-5ff8a6265a5c","title":"Fallout","description":"The Fallout franchise takes place in an alternate, retro-futuristic timeline where society stagnated in a 1950s aesthetic. After global oil shortages sparked the Resource Wars, the world was devastated by a nuclear apocalypse in 2077. The games follow survivors and vault dwellers emerging into a dangerous nuclear wasteland","image":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAkGBxMSEhUTExQWFhUXGB8XGRgYGBodGhobGxgYHh8bGB0fHSggGholHRodITE
